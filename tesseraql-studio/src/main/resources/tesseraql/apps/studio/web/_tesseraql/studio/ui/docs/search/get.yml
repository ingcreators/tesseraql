version: tesseraql/v1
id: tql.studio.docs.search
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false

security:
  auth: browser

sql:
  service: docs.search
  params:
    q: query.q

response:
  html:
    status: 200
    template: results.html
    model:
      results: sql
