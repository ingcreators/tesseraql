version: tesseraql/v1
id: tql.studio.data
kind: route
recipe: query-html

input:
  table:
    type: string
    required: false
  page:
    type: string
    required: false
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false
  filterColumn:
    type: string
    required: false
  filterValue:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.data
  params:
    table: params.table
    page: params.page
    sort: params.sort
    dir: params.dir
    filterColumn: params.filterColumn
    filterValue: params.filterValue

response:
  html:
    status: 200
    template: data.html
    model:
      data: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
