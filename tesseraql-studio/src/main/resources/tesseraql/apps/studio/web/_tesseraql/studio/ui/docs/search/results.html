<ul class="hc-stack" xmlns:th="http://www.thymeleaf.org" th:fragment="results">
  <li class="hc-empty" th:unless="${results.hasResults}">
    <span class="hc-empty__title"
          th:text="${#strings.isEmpty(results.query)} ? 'Type to search routes.' : 'No matches.'">Type to search routes.</span>
  </li>
  <li class="hc-cluster" th:each="r : ${results.results}">
    <a th:href="${r.detailUrl}" th:text="${r.id}"></a>
    <span class="hc-badge" th:text="${r.method}"></span>
    <code th:text="${r.path}"></code>
  </li>
</ul>
