version: tesseraql/v1
id: tql.studio.drafts
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false
  applied:
    type: string
    required: false
  discarded:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.drafts
  params:
    q: params.q
    roles: principal.roles

response:
  html:
    status: 200
    template: drafts.html
    model:
      page: sql
      applied: params.applied
      discarded: params.discarded
