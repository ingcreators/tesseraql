version: tesseraql/v1
id: tql.studio.newRoute
kind: route
recipe: command-json

input:
  path:
    type: string
    required: true
  recipe:
    type: string
    required: false

security:
  auth: bearer

sql:
  service: studio.newRoute
  params:
    path: params.path
    recipe: params.recipe
    roles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/source?path={params.path}
