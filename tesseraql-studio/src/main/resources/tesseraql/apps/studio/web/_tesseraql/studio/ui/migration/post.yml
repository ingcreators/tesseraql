version: tesseraql/v1
id: tql.studio.migration.create
kind: route
recipe: query-html

input:
  datasource:
    type: string
    required: false
  vendor:
    type: string
    required: false
  kind:
    type: string
    required: false
  description:
    type: string
    required: true
  ddl:
    type: string
    required: false

security:
  auth: browser
  csrf: true

sql:
  service: studio.migration.create
  params:
    datasource: params.datasource
    vendor: params.vendor
    kind: params.kind
    description: params.description
    ddl: params.ddl
    actor: principal.loginId
    roles: principal.roles

response:
  html:
    status: 200
    template: created.html
    model:
      mig: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
