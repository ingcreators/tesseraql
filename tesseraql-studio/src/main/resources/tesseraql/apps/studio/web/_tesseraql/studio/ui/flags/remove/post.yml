version: tesseraql/v1
id: tql.studio.flags.remove
kind: route
recipe: command-json

# Removes a feature flag from config/flags.yml (edit-gated).
input:
  name:
    type: string
    required: true

security:
  auth: browser
  csrf: true

sql:
  service: studio.flagsRemove
  params:
    name: params.name
    actor: principal.loginId
    principalRoles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/flags?removed=1
