<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: studio-page('Identity realm wizard', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/studio/ui/wizard">&larr; wizards</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <p class="hc-field__message">Generates a tesseraql-identity.yml fragment to merge into config/tesseraql.yml.</p>
  <form method="post" action="/_tesseraql/studio/ui/wizard/identity">
    <input type="hidden" name="_csrf" th:value="${_csrf}">
    <div class="hc-field">
      <label class="hc-field__label" for="realm-id">Realm id</label>
      <input class="hc-input" id="realm-id" type="text" name="realmId" required placeholder="local">
    </div>
    <div class="hc-field">
      <label class="hc-field__label" for="realm-type">Realm type</label>
      <select class="hc-select" id="realm-type" name="type" required><option value="managed">managed</option><option value="sql">sql</option></select>
      <p class="hc-field__message"><code>managed</code> stores accounts in TesseraQL's own tables; <code>sql</code> maps them to your existing tables via a SQL contract (set its root below).</p>
    </div>
    <div class="hc-field">
      <label class="hc-field__label" for="datasource">Datasource name</label>
      <input class="hc-input" id="datasource" type="text" name="datasource" required value="main">
    </div>
    <div class="hc-field">
      <label class="hc-field__label" for="sql-root">SQL contract root (sql realms, optional)</label>
      <input class="hc-input" id="sql-root" type="text" name="sqlRoot" placeholder="security/identity/local">
    </div>
    <div class="hc-field">
      <label class="hc-field__label" for="user-management">User management capability (optional)</label>
      <select class="hc-select" id="user-management" name="userManagement"><option value="">-</option><option value="readOnly">readOnly</option><option value="readWrite">readWrite</option></select>
    </div>
    <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="primary">Generate &amp; download config</button></div>
  
    <div class="hc-cluster">
      <button class="hc-button" type="submit"
              formaction="/_tesseraql/studio/ui/wizard/identity/apply"
              data-hc-confirm="Write these identity realm settings to config/overlay.yml? Only secret references are stored; they apply on the next start."
              data-hc-confirm-title="Write to overlay" data-hc-confirm-label="Write">Write to config overlay</button>
    </div>
  </form>
</section>
</div>
</html>
