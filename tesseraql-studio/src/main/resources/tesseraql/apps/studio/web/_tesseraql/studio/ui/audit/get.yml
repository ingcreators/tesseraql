version: tesseraql/v1
id: tql.studio.audit
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false
  page:
    type: integer
    required: false
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false

security:
  auth: bearer

sql:
  service: studio.audit
  params:
    q: params.q
    page: params.page
    sort: params.sort
    dir: params.dir

response:
  html:
    status: 200
    template: audit.html
    model:
      page: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
