version: tesseraql/v1
id: tql.studio.discard
kind: route
recipe: command-json

input:
  path:
    type: string
    required: true

security:
  auth: bearer

sql:
  service: studio.discard
  params:
    path: params.path
    roles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/source?path={params.path}
