<th:block xmlns:th="http://www.thymeleaf.org">
  <p class="hc-alert" data-variant="error" role="alert" th:if="${result.error}"
     th:text="${result.error}">Request failed.</p>
  <div class="hc-stack" th:if="${result.ok}">
    <div class="hc-cluster">
      <span class="hc-badge"
            th:attr="data-variant=${result.status < 400} ? 'success' : (${result.status < 500} ? 'warning' : 'error')"
            th:text="|${result.method} · ${result.status}|">GET · 200</span>
      <span class="hc-field__message" th:text="|${result.durationMs} ms|">0 ms</span>
      <code th:text="${result.url}">url</code>
    </div>
    <details class="hc-disclosure">
      <summary>Response headers</summary>
      <div class="hc-datagrid">
        <div class="hc-datagrid__scroll">
          <table class="hc-datagrid__table">
            <tbody class="hc-datagrid__body">
              <tr class="hc-datagrid__row" th:each="h : ${result.headers}">
                <td class="hc-datagrid__cell"><code th:text="${h.name}">name</code></td>
                <td class="hc-datagrid__cell" th:text="${h.value}">value</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </details>
    <div class="hc-field">
      <label class="hc-field__label">Response body</label>
      <pre class="hc-code"><code th:text="${result.body}">body</code></pre>
    </div>
    <!-- The test recorder (roadmap Phase 43, Track J3): a recordable invocation saves as a
         declarative sql: test case under tests/, expectation captured from the sandbox. -->
    <form class="hc-cluster" method="post" action="/_tesseraql/studio/ui/try/record"
          th:if="${result.recordable != null && result.recordable && result.status < 400}">
      <input type="hidden" name="_csrf" th:value="${_csrf}">
      <input type="hidden" name="method" th:value="${result.method}">
      <input type="hidden" name="path" th:value="${result.path}">
      <input type="hidden" name="query" th:value="${result.query}">
      <input type="hidden" name="body" th:value="${result.sentBody}">
      <input class="hc-input" data-size="sm" name="name"
             th:placeholder="|recorded: ${result.method} ${result.path}|">
      <button class="hc-button" data-size="sm" type="submit">Save as test case</button>
      <span class="hc-field__message">Writes <code>tests/studio-recorded-test.yml</code> so this
        check runs as a regression test.</span>
    </form>
    <p class="hc-field__message"
       th:if="${result.recordable != null && !result.recordable && result.reason != null}"
       th:text="${result.reason}"></p>
  </div>
</th:block>
