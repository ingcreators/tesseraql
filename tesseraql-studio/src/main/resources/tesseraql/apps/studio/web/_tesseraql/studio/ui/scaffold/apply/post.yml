version: tesseraql/v1
id: tql.studio.scaffold.apply
kind: route
recipe: query-html

input:
  table:
    type: string
    required: true
  force:
    type: string
    required: false

security:
  auth: browser
  csrf: true

sql:
  service: studio.scaffold.apply
  params:
    table: params.table
    force: params.force
    actor: principal.loginId
    roles: principal.roles

response:
  html:
    status: 200
    template: apply.html
    model:
      scaffold: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
