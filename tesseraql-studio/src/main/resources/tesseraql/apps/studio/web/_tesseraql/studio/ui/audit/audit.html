<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: studio-page('TesseraQL Studio · Audit', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/studio/ui">&larr; explorer</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <h2>Audit trail</h2>
  <p class="hc-field__message">Who applied or scaffolded what, and when &mdash; recorded under <code>work/studio/audit</code>, newest first.</p>
  <div class="hc-field">
    <label class="hc-field__label" for="audit-filter">Filter</label>
    <input class="hc-input" id="audit-filter" type="search" name="q" th:value="${page.query}"
           placeholder="Filter by actor, action, target&hellip;" autocomplete="off"
           hx-get="/_tesseraql/studio/ui/audit" hx-trigger="keyup changed delay:250ms, search"
           hx-target="#audit-table" hx-select="#audit-table" hx-swap="outerHTML"
           hx-indicator="next .htmx-indicator">
    <th:block th:replace="~{tql/shell :: busy('Filtering…')}"/>
  </div>
  <div id="audit-table" class="hc-stack">
    <p class="hc-field__message" th:if="${page.hasEntries}"
       th:text="${page.total + ' action' + (page.total == 1 ? '' : 's') + (page.paged ? ', newest first' : '')}">0 actions</p>
    <div class="hc-empty" th:unless="${page.hasEntries}">
      <p class="hc-empty__title" th:text="${#strings.isEmpty(page.query)} ? 'No audited actions yet.' : 'No actions match.'">No matches.</p>
    </div>
    <table class="hc-table" th:if="${page.hasEntries}">
      <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th></tr></thead>
      <tbody>
        <tr th:each="e : ${page.entries}">
          <td th:text="${e.at}"></td>
          <td th:text="${e.actor}"></td>
          <td><span class="hc-badge" th:attr="data-variant=${e.action == 'scaffold'} ? 'info' : 'success'" th:text="${e.action}"></span></td>
          <td>
            <a th:if="${e.targetUrl}" th:href="${e.targetUrl}" th:text="${e.target}"></a>
            <code th:unless="${e.targetUrl}" th:text="${e.target}"></code>
          </td>
        </tr>
      </tbody>
    </table>
    <nav class="hc-pagination" aria-label="Pagination" th:if="${page.paged}">
      <a th:if="${page.hasPrev}" class="hc-pagination__item"
         th:href="@{/_tesseraql/studio/ui/audit(q=${page.query},page=${page.prevPage})}">&lsaquo; Prev</a>
      <span th:unless="${page.hasPrev}" class="hc-pagination__item" aria-disabled="true">&lsaquo; Prev</span>
      <span class="hc-pagination__item" aria-current="page" th:text="|Page ${page.pageNum} of ${page.totalPages}|">Page 1 of 1</span>
      <a th:if="${page.hasNext}" class="hc-pagination__item"
         th:href="@{/_tesseraql/studio/ui/audit(q=${page.query},page=${page.nextPage})}">Next &rsaquo;</a>
      <span th:unless="${page.hasNext}" class="hc-pagination__item" aria-disabled="true">Next &rsaquo;</span>
    </nav>
  </div>
</section>
</div>
</html>
