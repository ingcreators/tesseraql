version: tesseraql/v1
id: tql.studio.sqlBuilder.build
kind: route
recipe: query-html

input:
  table:
    type: string
    required: true
  operation:
    type: string
    required: true

security:
  auth: bearer

sql:
  service: studio.sqlBuilder.build
  params:
    table: params.table
    operation: params.operation

response:
  html:
    status: 200
    template: build.html
    model:
      b: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
