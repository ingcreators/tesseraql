version: tesseraql/v1
id: tql.studio.sqlBuilder.build
kind: route
recipe: query-html

input:
  table:
    type: string
    required: true
  operation:
    type: string
    required: true
  column:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.sqlBuilder.build
  params:
    table: params.table
    operation: params.operation
    column: params.column

response:
  html:
    status: 200
    template: build.html
    model:
      b: sql
