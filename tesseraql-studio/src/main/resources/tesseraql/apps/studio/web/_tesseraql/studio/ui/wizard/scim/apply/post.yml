version: tesseraql/v1
id: tql.studio.wizard.scim.apply
kind: route
recipe: query-html

input:
  groups:
    type: string
    required: false
  outbound:
    type: string
    required: false
  outboundUrl:
    type: string
    required: false
  tokenRef:
    type: string
    required: false

security:
  auth: browser
  csrf: true

sql:
  service: studio.wizard.scim.apply
  params:
    groups: params.groups
    outbound: params.outbound
    outboundUrl: params.outboundUrl
    tokenRef: params.tokenRef
    roles: principal.roles
    actor: principal.loginId

response:
  html:
    status: 200
    template: applied.html
    model:
      result: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
