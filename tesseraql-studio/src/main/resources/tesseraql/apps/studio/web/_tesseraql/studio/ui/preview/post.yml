version: tesseraql/v1
id: tql.studio.preview
kind: route
recipe: query-html

input:
  path:
    type: string
    required: true
  content:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.preview
  params:
    path: params.path
    content: params.content

response:
  html:
    status: 200
    template: preview.html
    model:
      preview: sql
