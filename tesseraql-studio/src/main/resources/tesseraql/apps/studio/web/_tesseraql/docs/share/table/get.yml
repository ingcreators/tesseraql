version: tesseraql/v1
id: tql.studio.docs.share.table
kind: route
recipe: query-html

# Public by design (F8, slice 3, extended): the signed, expiring token in the query is the
# authorization. The docs.shareTable provider verifies the HMAC and expiry before rendering; an
# invalid, tampered, or expired token (or sharing disabled) renders the invalid-link notice.
input:
  ds:
    type: string
    required: false
  name:
    type: string
    required: false
  exp:
    type: string
    required: false
  sig:
    type: string
    required: false

security:
  auth: public

sql:
  service: docs.shareTable
  params:
    ds: query.ds
    name: query.name
    exp: query.exp
    sig: query.sig

response:
  html:
    status: 200
    template: share-table.html
    model:
      tbl: sql
