version: tesseraql/v1
id: tql.studio.docs.schema
kind: route
recipe: query-html

input:
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false

security:
  auth: browser

sql:
  service: docs.schema
  params:
    sort: params.sort
    dir: params.dir

response:
  html:
    status: 200
    template: schema.html
    model:
      sch: sql
