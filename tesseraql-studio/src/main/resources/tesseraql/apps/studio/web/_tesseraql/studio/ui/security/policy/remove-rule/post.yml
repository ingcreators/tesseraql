version: tesseraql/v1
id: tql.studio.policy.removeRule
kind: route
recipe: command-json

# Revokes a role/permission rule from a policy (writes the reduced set to config/overlay.yml), then
# rebinds the live PolicyEngine. Edit-gated in the provider.
input:
  policy:
    type: string
    required: true
  kind:
    type: string
    required: true
  value:
    type: string
    required: true

security:
  auth: browser
  csrf: true

sql:
  service: studio.policyRemoveRule
  params:
    policy: params.policy
    kind: params.kind
    value: params.value
    actor: principal.loginId
    principalRoles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/security?removed=1
