<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: studio-page(|TesseraQL Schema · ${sch.appName}|, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/studio/ui/docs">&larr; docs</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
  <section class="hc-card" th:unless="${sch.hasSchema}">
    <h2>Schema</h2>
    <div class="hc-empty">
      <p class="hc-empty__title">No schema introspected yet.</p>
      <p>Run the <code>tesseraql:schema</code> goal against the migrated database to populate table definitions.</p>
    </div>
  </section>
  <section class="hc-card" th:if="${sch.hasSchema}" th:each="ds : ${sch.datasources}">
    <h2 th:text="|Datasource: ${ds.name}|"></h2>
    <span class="hc-field__label" th:text="|${ds.tableCount} tables|"></span>
    <div class="hc-datagrid">
      <div class="hc-datagrid__scroll">
        <table class="hc-datagrid__table">
          <thead class="hc-datagrid__head"><tr>
            <th class="hc-datagrid__headcell" data-sortable data-col="name" th:attr="aria-sort=${sch.ariaSort.name}"><a th:href="${sch.sortHref.name}">Table</a></th>
            <th class="hc-datagrid__headcell" data-sortable data-col="type" th:attr="aria-sort=${sch.ariaSort.type}"><a th:href="${sch.sortHref.type}">Type</a></th>
            <th class="hc-datagrid__headcell" data-sortable data-col="columnCount" th:attr="aria-sort=${sch.ariaSort.columnCount}"><a th:href="${sch.sortHref.columnCount}">Columns</a></th>
            <th class="hc-datagrid__headcell">Primary key</th>
            <th class="hc-datagrid__headcell" data-sortable data-col="foreignKeyCount" th:attr="aria-sort=${sch.ariaSort.foreignKeyCount}"><a th:href="${sch.sortHref.foreignKeyCount}">FKs</a></th>
          </tr></thead>
          <tbody class="hc-datagrid__body">
            <tr class="hc-datagrid__row" th:each="t : ${ds.tables}">
              <td class="hc-datagrid__cell"><a th:href="${t.detailUrl}" th:text="${t.name}"></a></td>
              <td class="hc-datagrid__cell"><span class="hc-badge" data-variant="info" th:text="${t.type}"></span></td>
              <td class="hc-datagrid__cell" th:text="${t.columnCount}"></td>
              <td class="hc-datagrid__cell" th:text="${t.primaryKey}"></td>
              <td class="hc-datagrid__cell" th:text="${t.foreignKeyCount}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
</html>
