version: tesseraql/v1
id: tql.studio.data.export
kind: route
recipe: query-html

input:
  table:
    type: string
    required: true
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false
  fc0: { type: string, required: false }
  fo0: { type: string, required: false }
  fv0: { type: string, required: false }
  fc1: { type: string, required: false }
  fo1: { type: string, required: false }
  fv1: { type: string, required: false }
  fc2: { type: string, required: false }
  fo2: { type: string, required: false }
  fv2: { type: string, required: false }

security:
  auth: browser

sql:
  service: studio.data.export
  params:
    table: params.table
    sort: params.sort
    dir: params.dir
    fc0: params.fc0
    fo0: params.fo0
    fv0: params.fv0
    fc1: params.fc1
    fo1: params.fo1
    fv1: params.fv1
    fc2: params.fc2
    fo2: params.fo2
    fv2: params.fv2

response:
  file:
    template: data.csv.tpl
    contentType: "text/csv; charset=utf-8"
    filename: data.csv
    model:
      csv: sql
