version: tesseraql/v1
id: tql.studio.render
kind: route
recipe: query-html

input:
  path:
    type: string
    required: true
  content:
    type: string
    required: false
  sampleModel:
    type: string
    required: false
  live:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.render
  params:
    path: params.path
    content: params.content
    sampleModel: params.sampleModel
    live: params.live

response:
  html:
    status: 200
    template: render.html
    model:
      render: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-src 'self' data:; frame-ancestors 'none'"
