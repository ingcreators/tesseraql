version: tesseraql/v1
id: tql.studio.draftsDiscardAll
kind: route
recipe: command-json

# Discards every pending draft at once (Studio Drafts bulk actions). Edit-gated in the provider;
# the UI guards it behind an hc-confirm modal. Redirects back to the (now empty) Drafts list.
security:
  auth: browser
  csrf: true

sql:
  service: studio.draftsDiscardAll
  params:
    roles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/drafts?discarded=1
