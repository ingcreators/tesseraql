version: tesseraql/v1
id: tql.studio.connectors.credential
kind: route
recipe: command-json

input:
  scope:
    type: string
    required: true
  name:
    type: string
    required: true
  type:
    type: string
    required: true
  token:
    type: string
    required: false
  username:
    type: string
    required: false
  password:
    type: string
    required: false
  header:
    type: string
    required: false
  value:
    type: string
    required: false

security:
  auth: browser
  csrf: true

sql:
  service: studio.connectors.credential
  params:
    scope: params.scope
    name: params.name
    type: params.type
    token: params.token
    username: params.username
    password: params.password
    header: params.header
    value: params.value
    roles: principal.roles
    actor: principal.loginId

response:
  redirect:
    status: 303
    location: /_tesseraql/studio/ui/connectors?saved=1
