<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: page(${src.path}, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <a class="back" href="/_tesseraql/studio/ui">&larr; explorer</a>
</th:block>
<div id="page-content">
<section class="hc-card">
  <p class="status" th:if="${saved}">Draft saved.</p>
  <p class="status" th:if="${applied}">Draft applied and routes reloaded.</p>
  <th:block th:if="${src.readOnly}">
    <p class="empty">Read-only mode &mdash; edit drafts via the Studio API.</p>
    <pre class="source" th:text="${src.content}"></pre>
  </th:block>
  <th:block th:if="${src.editable}">
    <form method="post" action="/_tesseraql/studio/ui/save">
      <input type="hidden" name="path" th:value="${src.path}">
      <textarea name="content" class="hc-input source" rows="24" spellcheck="false" th:text="${src.content}"></textarea>
      <div class="toolbar"><button type="submit" class="hc-button" data-variant="primary">Save draft</button></div>
    </form>
    <form method="post" action="/_tesseraql/studio/ui/apply">
      <input type="hidden" name="path" th:value="${src.path}">
      <div class="toolbar"><button type="submit" class="hc-button" data-variant="primary">Apply draft &amp; reload</button></div>
    </form>
  </th:block>
</section>
</div>
</html>
