<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: page(${src.path}, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/studio/ui">&larr; explorer</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <p class="hc-alert" data-variant="success" role="status" th:if="${saved}">Draft saved.</p>
  <p class="hc-alert" data-variant="success" role="status" th:if="${applied}">Draft applied and routes reloaded.</p>
  <th:block th:if="${src.readOnly}">
    <p class="hc-field__message">Read-only mode &mdash; edit drafts via the Studio API.</p>
    <pre class="source" th:text="${src.content}"></pre>
  </th:block>
  <th:block th:if="${src.editable}">
    <div class="hc-cluster" th:if="${src.hasDraft}">
      <span class="hc-badge" data-variant="warning">unsaved draft</span>
    </div>
    <form method="post" action="/_tesseraql/studio/ui/save">
      <input type="hidden" id="src-path" name="path" th:value="${src.path}">
      <textarea name="content" class="hc-input source" rows="24" spellcheck="false"
                th:text="${src.content}"
                hx-post="/_tesseraql/studio/ui/preview"
                hx-trigger="keyup changed delay:300ms, change"
                hx-include="#src-path"
                hx-target="#preview-result" hx-swap="innerHTML"></textarea>
      <div id="preview-result" class="hc-stack" aria-live="polite"></div>
      <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="primary">Save draft</button></div>
    </form>
    <details class="hc-stack" th:if="${src.hasDraft}">
      <summary>Compare against saved source</summary>
      <pre class="source" th:text="${src.sourceContent}"></pre>
    </details>
    <form hx-post="/_tesseraql/studio/ui/apply" hx-target="#apply-result" hx-swap="innerHTML">
      <input type="hidden" name="path" th:value="${src.path}">
      <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="primary">Apply draft &amp; reload</button></div>
    </form>
    <div id="apply-result" class="hc-stack" aria-live="polite"></div>
    <form method="post" action="/_tesseraql/studio/ui/discard" th:if="${src.hasDraft}">
      <input type="hidden" name="path" th:value="${src.path}">
      <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="ghost">Discard draft</button></div>
    </form>
  </th:block>
</section>
</div>
</html>
