version: tesseraql/v1
id: tql.studio.routeForm
kind: route
recipe: query-html

input:
  path:
    type: string
    required: true

security:
  auth: browser

sql:
  service: studio.routeForm.view
  params:
    path: params.path
    roles: principal.roles

response:
  html:
    status: 200
    template: route-form.html
    model:
      rf: sql
