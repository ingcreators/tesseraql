version: tesseraql/v1
id: tql.studio.docs
kind: route
recipe: query-html

input:
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false

security:
  auth: browser

sql:
  service: docs.index
  params:
    sort: params.sort
    dir: params.dir

response:
  html:
    status: 200
    template: docs.html
    model:
      docs: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
