version: tesseraql/v1
id: tql.studio.migration.dryRun
kind: route
recipe: query-html

input:
  path:
    type: string
    required: true
  content:
    type: string
    required: false

security:
  auth: bearer

sql:
  service: studio.migration.dryRun
  params:
    path: params.path
    content: params.content

response:
  html:
    status: 200
    template: dry-run.html
    model:
      dryRun: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
