version: tesseraql/v1
id: tql.studio.migration.dryRun
kind: route
recipe: query-html

input:
  path:
    type: string
    required: true
  content:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.migration.dryRun
  params:
    path: params.path
    content: params.content

response:
  html:
    status: 200
    template: dry-run.html
    model:
      dryRun: sql
