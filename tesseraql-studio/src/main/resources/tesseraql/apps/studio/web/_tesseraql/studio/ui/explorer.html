<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: studio-page(|TesseraQL Studio · ${studio.appName}|, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <!-- The section links moved to the Studio sidebar nav (track H1); the header keeps the
         mode badge so the editable/read-only state stays visible from the landing page. -->
    <span class="hc-badge" data-variant="warning" th:if="${studio.readOnly}">read-only</span>
    <span class="hc-badge" data-variant="success" th:if="${studio.editable}">editable</span>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<!-- Create actions (Studio sidebar IA): the Explorer's job is to browse/open existing routes, so
     the New-route form is collapsed into a disclosure rather than a permanent panel above the tree,
     and the sibling creation flows (Scaffold / Migration / Wizards) are surfaced here too — not only
     in the sidebar — so "start something new" is discoverable from where you browse. -->
<section class="hc-card" th:if="${studio.editable}">
  <!-- Opened and its Path seeded when a folder's "New route here" link passes ?new=<prefix>/, so
       creating a route inherits the browsed location instead of a hand-typed path. -->
  <details class="hc-disclosure" th:attr="open=${!#strings.isEmpty(studio.newPath)} ? '' : null">
    <summary>New route</summary>
    <p class="hc-field__message">Creates a starter route as a draft and opens it in the editor to finish. A new route needs a restart to be served.</p>
    <form class="hc-stack" method="post" action="/_tesseraql/studio/ui/new">
      <input type="hidden" name="_csrf" th:value="${_csrf}">
      <div class="hc-field">
        <label class="hc-field__label" for="new-route-path">Path</label>
        <input class="hc-input" id="new-route-path" type="text" name="path" required
               th:value="${studio.newPath}" placeholder="web/api/widgets/get.yml">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="new-route-recipe">Recipe</label>
        <select class="hc-select" id="new-route-recipe" name="recipe">
          <option value="query-json">query-json</option>
          <option value="query-html">query-html</option>
          <option value="command-json">command-json</option>
        </select>
      </div>
      <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="primary">Create route</button></div>
    </form>
  </details>
  <p class="hc-field__message">Or create with
    <a href="/_tesseraql/studio/ui/scaffold">Scaffold</a> ·
    <a href="/_tesseraql/studio/ui/migration">Migration</a> ·
    <a href="/_tesseraql/studio/ui/wizard">Wizards</a>.
  </p>
</section>
<section class="hc-card">
  <h2>Routes &amp; jobs</h2>
  <div class="hc-field">
    <label class="hc-field__label" for="explorer-filter">Filter</label>
    <input class="hc-input" id="explorer-filter" type="search" name="q" th:value="${studio.query}"
           placeholder="Filter by id, path, recipe…" autocomplete="off"
           hx-get="/_tesseraql/studio/ui" hx-trigger="keyup changed delay:250ms, search"
           hx-target="#explorer-tree" hx-select="#explorer-tree" hx-swap="outerHTML"
           hx-indicator="next .htmx-indicator">
    <th:block th:replace="~{tql/shell :: busy('Filtering…')}"/>
  </div>
  <div id="explorer-tree" class="hc-stack" th:with="root=${studio.tree}">
    <div class="hc-empty" th:if="${root.empty}">
      <p class="hc-empty__title" th:text="${#strings.isEmpty(studio.query)} ? 'No routes or jobs defined.' : 'No routes or jobs match.'">No matches.</p>
    </div>
    <th:block th:each="folder : ${root.folders}">
      <th:block th:replace="~{:: explorerNode(${folder})}"></th:block>
    </th:block>
    <th:block th:each="leaf : ${root.leaves}">
      <th:block th:replace="~{:: explorerLeaf(${leaf})}"></th:block>
    </th:block>
  </div>
</section>
</div>
<th:block th:fragment="explorerNode(folder)">
  <details class="hc-disclosure" open>
    <summary th:text="${folder.name}"></summary>
    <div class="hc-stack tql-tree__children">
      <!-- Contextual create (Studio sidebar IA): seeds the New-route form's Path with this folder's
           prefix so a new route lands where you are browsing, not a path typed from memory. -->
      <a th:if="${studio.editable}" class="hc-field__message tql-tree__new"
         th:href="|/_tesseraql/studio/ui?prefix=${folder.path}/|">+ New route here</a>
      <th:block th:each="child : ${folder.folders}">
        <th:block th:replace="~{:: explorerNode(${child})}"></th:block>
      </th:block>
      <th:block th:each="leaf : ${folder.leaves}">
        <th:block th:replace="~{:: explorerLeaf(${leaf})}"></th:block>
      </th:block>
    </div>
  </details>
</th:block>
<div class="hc-cluster" th:fragment="explorerLeaf(leaf)">
  <span class="hc-badge"
        th:attr="data-variant=${leaf.kind == 'job'} ? 'info' : (${leaf.kind == 'draft'} ? 'success' : 'neutral')"
        th:text="${leaf.badge}"></span>
  <a th:href="${leaf.sourceUrl}" th:text="${leaf.label}"></a>
  <span class="hc-field__message" th:text="${leaf.recipe}" th:unless="${#strings.isEmpty(leaf.recipe)}"></span>
  <!-- Draft state (Studio sidebar IA): a served entry with an unsaved draft, and a conflict when the
       source moved underneath it. A new draft is its own leaf (kind=draft, the 'new' badge above). -->
  <span class="hc-badge" data-variant="warning" th:if="${leaf.edited}">unsaved draft</span>
  <span class="hc-badge" data-variant="error" th:if="${leaf.conflict}">conflict</span>
</div>
</html>
