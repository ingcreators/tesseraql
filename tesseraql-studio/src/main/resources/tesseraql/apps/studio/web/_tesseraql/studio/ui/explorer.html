<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: page(|TesseraQL Studio · ${studio.appName}|, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a href="/_tesseraql/studio/ui/docs">docs &rarr;</a>
    <a th:if="${studio.scaffoldEnabled}" href="/_tesseraql/studio/ui/scaffold">scaffold &rarr;</a>
    <a href="/_tesseraql/studio/ui/wizard">wizards &rarr;</a>
    <span class="hc-badge" data-variant="warning" th:if="${studio.readOnly}">read-only</span>
    <span class="hc-badge" data-variant="success" th:if="${studio.editable}">editable</span>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card" th:if="${studio.editable}">
  <h2>New route</h2>
  <p class="hc-field__message">Creates a starter route as a draft and opens it in the editor to finish. A new route needs a restart to be served.</p>
  <form class="hc-stack" method="post" action="/_tesseraql/studio/ui/new">
    <div class="hc-field">
      <label class="hc-field__label" for="new-route-path">Path</label>
      <input class="hc-input" id="new-route-path" type="text" name="path" required
             placeholder="web/api/widgets/get.yml">
    </div>
    <div class="hc-field">
      <label class="hc-field__label" for="new-route-recipe">Recipe</label>
      <select class="hc-select" id="new-route-recipe" name="recipe">
        <option value="query-json">query-json</option>
        <option value="query-html">query-html</option>
        <option value="command-json">command-json</option>
      </select>
    </div>
    <div class="hc-cluster"><button type="submit" class="hc-button" data-variant="primary">Create route</button></div>
  </form>
</section>
<section class="hc-card">
  <h2>Routes</h2>
  <div class="hc-empty" th:unless="${studio.hasRoutes}"><p class="hc-empty__title">No routes defined.</p></div>
  <table class="hc-table" th:if="${studio.hasRoutes}">
    <thead><tr><th>Id</th><th>Method</th><th>Path</th><th>Recipe</th><th>Source</th></tr></thead>
    <tbody>
      <tr th:each="r : ${studio.routes}">
        <td th:text="${r.id}"></td>
        <td th:text="${r.method}"></td>
        <td th:text="${r.path}"></td>
        <td th:text="${r.recipe}"></td>
        <td><a th:href="${r.sourceUrl}" th:text="${r.source}"></a></td>
      </tr>
    </tbody>
  </table>
</section>
<section class="hc-card">
  <h2>Jobs</h2>
  <div class="hc-empty" th:unless="${studio.hasJobs}"><p class="hc-empty__title">No jobs defined.</p></div>
  <table class="hc-table" th:if="${studio.hasJobs}">
    <thead><tr><th>Id</th><th>Recipe</th><th>Source</th></tr></thead>
    <tbody>
      <tr th:each="j : ${studio.jobs}">
        <td th:text="${j.id}"></td>
        <td th:text="${j.recipe}"></td>
        <td><a th:href="${j.sourceUrl}" th:text="${j.source}"></a></td>
      </tr>
    </tbody>
  </table>
</section>
</div>
</html>
