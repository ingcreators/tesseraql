<div class="hc-stack" xmlns:th="http://www.thymeleaf.org" th:fragment="render">
  <p class="hc-alert" data-variant="error" role="alert"
     th:unless="${render.ok}" th:text="${render.error}"></p>
  <th:block th:if="${render.ok}">
    <details class="hc-stack" th:unless="${render.isPdf}" open>
      <summary>Rendered output</summary>
      <pre class="hc-code"><code th:utext="${render.outputHtml}"></code></pre>
    </details>
    <details class="hc-stack" th:if="${render.isHtml}" open>
      <summary>Visual preview</summary>
      <iframe class="tql-preview-frame" sandbox="" title="Rendered preview"
              th:attr="srcdoc=${render.previewDoc}"></iframe>
    </details>
    <div class="hc-stack" th:if="${render.isPdf}">
      <iframe class="tql-preview-frame" title="PDF preview" th:attr="src=${render.pdfUrl}"></iframe>
      <div class="hc-cluster">
        <a class="hc-button" data-variant="ghost" data-size="sm"
           th:attr="href=${render.pdfUrl}" download="preview.pdf">Download PDF</a>
      </div>
    </div>
  </th:block>
</div>
