version: tesseraql/v1
id: tql.studio.apply
kind: route
recipe: command-json

input:
  path:
    type: string
    required: true
  force:
    type: string
    required: false
  confirm:
    type: string
    required: false

security:
  auth: bearer

sql:
  service: studio.apply
  params:
    path: params.path
    force: params.force
    confirm: params.confirm
    actor: principal.loginId
    roles: principal.roles

response:
  redirect:
    location: /_tesseraql/studio/ui/source?path={params.path}&applied=1
