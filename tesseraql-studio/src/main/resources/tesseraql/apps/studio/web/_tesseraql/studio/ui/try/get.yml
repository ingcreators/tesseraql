version: tesseraql/v1
id: tql.studio.tryit
kind: route
recipe: query-html

input:
  path:
    type: string
    required: false
  method:
    type: string
    required: false

security:
  auth: browser

sql:
  service: studio.tryit
  params:
    path: params.path
    method: params.method

response:
  html:
    status: 200
    template: try.html
    model:
      tryit: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
