<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: studio-page('TesseraQL Studio · Drafts', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/studio/ui">&larr; explorer</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <h2>Pending drafts</h2>
  <p class="hc-field__message">Unsaved edits held under <code>work/studio/drafts</code>. Open one to review it, then apply or discard.</p>
  <p class="hc-alert" data-variant="warning" role="status" th:if="${page.hasConflicts}"
     th:text="|${page.conflictCount} draft(s) conflict with a source that changed underneath them.|"></p>
  <div class="hc-field">
    <label class="hc-field__label" for="drafts-filter">Filter</label>
    <input class="hc-input" id="drafts-filter" type="search" name="q" th:value="${page.query}"
           placeholder="Filter by path&hellip;" autocomplete="off"
           hx-get="/_tesseraql/studio/ui/drafts" hx-trigger="keyup changed delay:250ms, search"
           hx-target="#drafts-table" hx-select="#drafts-table" hx-swap="outerHTML"
           hx-indicator="next .htmx-indicator">
    <th:block th:replace="~{tql/shell :: busy('Filtering…')}"/>
  </div>
  <div id="drafts-table" class="hc-stack">
    <div class="hc-empty" th:unless="${page.hasDrafts}">
      <p class="hc-empty__title" th:text="${#strings.isEmpty(page.query)} ? 'No pending drafts.' : 'No drafts match.'">No matches.</p>
    </div>
    <div class="hc-datagrid" th:if="${page.hasDrafts}">
      <div class="hc-datagrid__scroll">
        <table class="hc-datagrid__table">
          <thead class="hc-datagrid__head"><tr>
            <th class="hc-datagrid__headcell">Path</th>
            <th class="hc-datagrid__headcell">Kind</th>
            <th class="hc-datagrid__headcell">Status</th>
          </tr></thead>
          <tbody class="hc-datagrid__body">
            <tr class="hc-datagrid__row" th:each="d : ${page.drafts}">
              <td class="hc-datagrid__cell"><a th:href="${d.sourceUrl}" th:text="${d.path}"></a></td>
              <td class="hc-datagrid__cell"><span class="hc-badge" th:attr="data-variant=${d.isNew} ? 'info' : 'neutral'" th:text="${d.kind}"></span></td>
              <td class="hc-datagrid__cell">
                <span class="hc-badge" data-variant="warning" th:if="${d.conflict}">conflict</span>
                <span th:unless="${d.conflict}">&mdash;</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
</div>
</html>
