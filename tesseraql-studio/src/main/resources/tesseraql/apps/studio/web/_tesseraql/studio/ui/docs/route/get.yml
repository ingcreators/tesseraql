version: tesseraql/v1
id: tql.studio.docs.route
kind: route
recipe: query-html

input:
  id:
    type: string
    required: true

security:
  auth: bearer

sql:
  service: docs.route
  params:
    id: query.id

response:
  html:
    status: 200
    template: route.html
    model:
      doc: sql
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
