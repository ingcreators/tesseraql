<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL Studio · SAML SP wizard</title>
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>SAML SP wizard</h1>
  <a class="back" href="/_tesseraql/studio/ui/wizard">&larr; wizards</a>
</header>
<main>
<section>
  <p class="hint">Generates a tesseraql-saml.yml fragment to merge into config/tesseraql.yml.
  Key material is referenced by file path under the app home; never paste certificate contents here.</p>
  <form method="post" action="/_tesseraql/studio/ui/wizard/saml">
    <label>SP entity ID / audience <span class="req">*</span><br>
      <input type="text" name="spAudience" required placeholder="https://app.example.com/saml"></label>
    <label>Assertion Consumer Service URL <span class="req">*</span><br>
      <input type="text" name="acsUrl" required placeholder="https://app.example.com/_tesseraql/saml/acs"></label>
    <label>IdP SSO URL <span class="req">*</span><br>
      <input type="text" name="ssoUrl" required placeholder="https://idp.example.com/sso"></label>
    <label>IdP SLO URL (optional)<br>
      <input type="text" name="sloUrl" placeholder="https://idp.example.com/slo"></label>
    <label>IdP metadata file path (optional)<br>
      <input type="text" name="idpMetadataPath" placeholder="security/saml/idp-metadata.xml"></label>
    <label>IdP signing certificate file path (optional)<br>
      <input type="text" name="publicKeyPath" placeholder="security/saml/idp-signing.pem"></label>
    <label>Login ID attribute <span class="req">*</span><br>
      <input type="text" name="loginIdAttribute" required placeholder="urn:oid:0.9.2342.19200300.100.1.1"></label>
    <label>Email attribute (optional)<br>
      <input type="text" name="emailAttribute" placeholder="urn:oid:0.9.2342.19200300.100.1.3"></label>
    <label>NameID format (optional)<br>
      <input type="text" name="nameIdFormat" placeholder="urn:oasis:names:tc:SAML:2.0:nameid-format:persistent"></label>
    <label>Auto-provision new users<br>
      <select name="provision"><option value="false">false</option><option value="true">true</option></select></label>
    <div class="toolbar"><button type="submit">Generate &amp; download config</button></div>
  </form>
</section>
</main>
</body>
</html>
