<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL Studio</title>
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>TesseraQL Studio · [[${studio.appName}]]</h1>
  <span class="actions"><a href="/_tesseraql/studio/ui/wizard">wizards &rarr;</a></span>
  <span class="badge ro" th:if="${studio.readOnly}">read-only</span>
  <span class="badge rw" th:if="${studio.editable}">editable</span>
</header>
<main>
<section>
  <h2>Routes</h2>
  <p class="empty" th:unless="${studio.hasRoutes}">No routes defined.</p>
  <table th:if="${studio.hasRoutes}">
    <thead><tr><th>Id</th><th>Method</th><th>Path</th><th>Recipe</th><th>Source</th></tr></thead>
    <tbody>
      <tr th:each="r : ${studio.routes}">
        <td th:text="${r.id}"></td>
        <td th:text="${r.method}"></td>
        <td th:text="${r.path}"></td>
        <td th:text="${r.recipe}"></td>
        <td><a th:href="${r.sourceUrl}" th:text="${r.source}"></a></td>
      </tr>
    </tbody>
  </table>
</section>
<section>
  <h2>Jobs</h2>
  <p class="empty" th:unless="${studio.hasJobs}">No jobs defined.</p>
  <table th:if="${studio.hasJobs}">
    <thead><tr><th>Id</th><th>Recipe</th><th>Source</th></tr></thead>
    <tbody>
      <tr th:each="j : ${studio.jobs}">
        <td th:text="${j.id}"></td>
        <td th:text="${j.recipe}"></td>
        <td><a th:href="${j.sourceUrl}" th:text="${j.source}"></a></td>
      </tr>
    </tbody>
  </table>
</section>
</main>
</body>
</html>
