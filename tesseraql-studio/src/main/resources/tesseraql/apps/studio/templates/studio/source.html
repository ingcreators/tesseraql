<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL Studio · source</title>
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>{{ src.path }}</h1>
  <a class="back" href="/_tesseraql/studio/ui">&larr; explorer</a>
</header>
<main>
<section>
  {{# saved }}<p class="status">Draft saved.</p>{{/ saved }}
  {{# applied }}<p class="status">Draft applied and routes reloaded.</p>{{/ applied }}
  {{# src.readOnly }}
  <p class="empty">Read-only mode &mdash; edit drafts via the Studio API.</p>
  <pre class="source">{{ src.content }}</pre>
  {{/ src.readOnly }}
  {{# src.editable }}
  <form method="post" action="/_tesseraql/studio/ui/save">
    <input type="hidden" name="path" value="{{ src.path }}">
    <textarea name="content" class="source" rows="24" spellcheck="false">{{ src.content }}</textarea>
    <div class="toolbar"><button type="submit">Save draft</button></div>
  </form>
  <form method="post" action="/_tesseraql/studio/ui/apply">
    <input type="hidden" name="path" value="{{ src.path }}">
    <div class="toolbar"><button type="submit" class="apply">Apply draft &amp; reload</button></div>
  </form>
  {{/ src.editable }}
</section>
</main>
</body>
</html>
