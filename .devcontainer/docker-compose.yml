services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ..:/workspace/tesseraql:cached

    command: sleep infinity

    # Local-only secrets (gitignored): GH_TOKEN for gh, API keys, etc.
    env_file:
      - path: ./devcontainer.local.env
        required: false

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      TESSERAQL_PROFILE: dev
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
