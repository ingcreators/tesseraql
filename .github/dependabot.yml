version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    groups:
      # Plugin patch/minor bumps land together; library and major bumps stay individual.
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
        update-types:
          - minor
          - patch
    ignore:
      # Spring 7 / Boot 4 is a deliberate migration (the pinned Boot 3.x actuator requires
      # Spring 6), not a dependency bump.
      - dependency-name: "org.springframework:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
    ignore:
      # The JDK in the tag is a deliberate choice (Java 21 baseline; CI checks 25
      # compatibility) and the tags are not semver, so this image is updated manually.
      - dependency-name: mcr.microsoft.com/devcontainers/java

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
    ignore:
      # The JDK in these tags is a deliberate choice (build targets --release 21, runtime
      # stays on the 21 LTS baseline) and the tags are not semver: updated manually.
      - dependency-name: maven
      - dependency-name: eclipse-temurin
