name: Release

on:
  push:
    tags:
      - 'v*'
  # (Re)publish the demo image for an existing release - e.g. after a
  # Dockerfile.demo fix that postdates the tag. Only the demo-image job runs.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish the demo image for
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Verify tag and publish GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # Writes a settings.xml mapping the 'github' server (parent distributionManagement) to
          # the workflow token, so `mvn deploy` can upload to GitHub Packages.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Verify
        run: ./mvnw -B -ntp clean verify

      - name: Check the reactor version matches the tag
        run: |
          VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "pom version $VERSION does not match tag $TAG" >&2
            exit 1
          fi

      - name: Publish to GitHub Packages and build the CLI distribution
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -DskipTests -Pdist deploy

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "TesseraQL ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag \
            tesseraql-cli/target/tesseraql-cli-*-dist.zip \
            tesseraql-cli/target/tesseraql-cli-*-dist.tar.gz

  # A prebuilt demo image so the five-minute demo is one docker run, no source
  # build: ghcr.io/<owner>/tesseraql-demo:{version,latest}. Rebuilds from the tag
  # inside Docker (Dockerfile.demo is multi-stage), so it needs nothing from the
  # release job beyond the tag having been verified there.
  demo-image:
    name: Publish the demo image
    runs-on: ubuntu-latest
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success')

    steps:
      - name: Checkout the release sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # The image CONTENT comes from the tag; the build RECIPE comes from the ref
      # the workflow ran from, so a Dockerfile.demo fix that postdates a tag can
      # still publish that tag's image (no-op on tag-push events).
      - name: Use the workflow's build recipe
        run: git checkout ${{ github.sha }} -- deploy/Dockerfile.demo

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/tesseraql-demo"
          docker build -f deploy/Dockerfile.demo -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
