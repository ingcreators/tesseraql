name: Release

on:
  push:
    tags:
      - 'v*'
  # (Re)publish the demo image for an existing release - e.g. after a
  # Dockerfile.demo fix that postdates the tag. Only the demo-image job runs.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish the demo image for
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Verify tag and publish GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # Writes a settings.xml mapping the 'github' server (parent distributionManagement) to
          # the workflow token, so `mvn deploy` can upload to GitHub Packages.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Verify
        run: ./mvnw -B -ntp clean verify

      - name: Check the reactor version matches the tag
        run: |
          VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "pom version $VERSION does not match tag $TAG" >&2
            exit 1
          fi

      - name: Publish to GitHub Packages and build the CLI distribution
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -DskipTests -Pdist deploy

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "TesseraQL ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag \
            tesseraql-cli/target/tesseraql-cli-*-dist.zip \
            tesseraql-cli/target/tesseraql-cli-*-dist.tar.gz

  # Publish the reactor to Maven Central (docs/app-developer-distribution.md): rebuilds
  # from the tag with the 'central' profile (sources + javadoc jars, PGP signatures, the
  # central-publishing bundle upload). Runs as its own job so a Portal-side failure never
  # blocks the GitHub release, the demo image, or the package-manager bumps - but still
  # shows up red. Soft-skips while the Central token / GPG secrets are not configured.
  central-publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'

    steps:
      - name: Check for the Central credentials
        id: creds
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$CENTRAL_TOKEN_USERNAME" ] || [ -z "$CENTRAL_TOKEN_PASSWORD" ] \
            || [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "Central token and/or GPG secrets are not configured - skipping the Maven Central publish." >&2
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.creds.outputs.present == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        if: steps.creds.outputs.present == 'true'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Import the release signing key
        if: steps.creds.outputs.present == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Publish to Maven Central
        if: steps.creds.outputs.present == 'true'
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -ntp -DskipTests -s .github/central-settings.xml -Pcentral deploy

  # Keep the Homebrew tap and Scoop bucket pointing at this release. The formula
  # tracks the fat-jar dist (uploaded by the release job above); the manifest
  # tracks the Windows app image, which jpackage.yml attaches asynchronously —
  # so poll the release assets until both digests are available. Cross-repo
  # writes use a short-lived installation token from the org-owned GitHub App
  # (Contents read/write, installed on ingcreators/homebrew-tap +
  # ingcreators/scoop-bucket). Soft-skips while the DIST_APP_ID /
  # DIST_APP_PRIVATE_KEY secrets are not configured, so missing credentials
  # never fail a release.
  bump-package-managers:
    name: Bump Homebrew tap and Scoop bucket
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'

    steps:
      - name: Check for the cross-repo app credentials
        id: token
        env:
          DIST_APP_ID: ${{ secrets.DIST_APP_ID }}
          DIST_APP_PRIVATE_KEY: ${{ secrets.DIST_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$DIST_APP_ID" ] || [ -z "$DIST_APP_PRIVATE_KEY" ]; then
            echo "DIST_APP_ID / DIST_APP_PRIVATE_KEY are not configured - skipping the package-manager bump." >&2
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint an installation token
        if: steps.token.outputs.present == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.DIST_APP_ID }}
          private-key: ${{ secrets.DIST_APP_PRIVATE_KEY }}
          owner: ingcreators
          repositories: |
            homebrew-tap
            scoop-bucket

      - name: Wait for both release assets and collect their digests
        if: steps.token.outputs.present == 'true'
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="tesseraql-cli-${VERSION}-dist.tar.gz"
          WIN="tesseraql-${VERSION}-windows-x86_64.zip"
          # The Windows jpackage job takes ~10 minutes; poll up to 20.
          for i in $(seq 1 60); do
            JSON=$(gh release view "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" --json assets)
            DIST_SHA=$(printf '%s' "$JSON" | jq -r --arg n "$DIST" \
              '.assets[] | select(.name == $n) | .digest // empty' | sed 's/^sha256://')
            WIN_SHA=$(printf '%s' "$JSON" | jq -r --arg n "$WIN" \
              '.assets[] | select(.name == $n) | .digest // empty' | sed 's/^sha256://')
            if [ -n "$DIST_SHA" ] && [ -n "$WIN_SHA" ]; then
              {
                echo "version=$VERSION"
                echo "dist_sha=$DIST_SHA"
                echo "win_sha=$WIN_SHA"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Waiting for release assets ($i/60)..."
            sleep 20
          done
          echo "Timed out waiting for $DIST and/or $WIN on release $GITHUB_REF_NAME" >&2
          exit 1

      - name: Bump the Homebrew formula
        if: steps.token.outputs.present == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.assets.outputs.version }}
          DIST_SHA: ${{ steps.assets.outputs.dist_sha }}
        run: |
          git clone --depth 1 "https://x-access-token:${APP_TOKEN}@github.com/ingcreators/homebrew-tap.git" tap
          cd tap
          sed -i -E \
            -e "s|/releases/download/v[^/]+/tesseraql-cli-[^\"]+-dist\.tar\.gz|/releases/download/v${VERSION}/tesseraql-cli-${VERSION}-dist.tar.gz|" \
            -e "s|^(  sha256 )\"[0-9a-f]{64}\"|\1\"${DIST_SHA}\"|" \
            Formula/tesseraql.rb
          grep -q "$DIST_SHA" Formula/tesseraql.rb || { echo "formula sed did not apply" >&2; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already at ${VERSION}; nothing to bump."
          else
            git commit -am "tesseraql ${VERSION}"
            git push
          fi

      - name: Bump the Scoop manifest
        if: steps.token.outputs.present == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.assets.outputs.version }}
          WIN_SHA: ${{ steps.assets.outputs.win_sha }}
        run: |
          git clone --depth 1 "https://x-access-token:${APP_TOKEN}@github.com/ingcreators/scoop-bucket.git" bucket-repo
          cd bucket-repo
          jq --indent 4 \
            --arg v "$VERSION" --arg h "$WIN_SHA" \
            '.version = $v
             | .url = "https://github.com/ingcreators/tesseraql/releases/download/v\($v)/tesseraql-\($v)-windows-x86_64.zip"
             | .hash = $h' \
            bucket/tesseraql.json > bucket/tesseraql.json.new
          mv bucket/tesseraql.json.new bucket/tesseraql.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Manifest already at ${VERSION}; nothing to bump."
          else
            git commit -am "tesseraql ${VERSION}"
            git push
          fi

  # A prebuilt demo image so the five-minute demo is one docker run, no source
  # build: ghcr.io/<owner>/tesseraql-demo:{version,latest}. Rebuilds from the tag
  # inside Docker (Dockerfile.demo is multi-stage), so it needs nothing from the
  # release job beyond the tag having been verified there.
  demo-image:
    name: Publish the demo image
    runs-on: ubuntu-latest
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success')

    steps:
      - name: Checkout the release sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # The image CONTENT comes from the tag; the build RECIPE comes from the ref
      # the workflow ran from, so a Dockerfile.demo fix that postdates a tag can
      # still publish that tag's image (no-op on tag-push events).
      - name: Use the workflow's build recipe
        run: git checkout ${{ github.sha }} -- deploy/Dockerfile.demo

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/tesseraql-demo"
          docker build -f deploy/Dockerfile.demo -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
