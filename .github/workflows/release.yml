name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Verify tag and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # Writes a settings.xml mapping the 'github' server (parent distributionManagement) to
          # the workflow token, so `mvn deploy` can upload to GitHub Packages.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Verify
        run: ./mvnw -B -ntp clean verify

      - name: Check the reactor version matches the tag
        run: |
          VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "pom version $VERSION does not match tag $TAG" >&2
            exit 1
          fi

      - name: Publish to GitHub Packages and build the CLI distribution
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -DskipTests -Pdist deploy

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "TesseraQL ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag \
            tesseraql-cli/target/tesseraql-cli-*-dist.zip \
            tesseraql-cli/target/tesseraql-cli-*-dist.tar.gz
