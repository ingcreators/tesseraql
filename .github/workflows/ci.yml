name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Maven verify on Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java:
          - '21'
          - '25'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify
        run: ./mvnw -B -ntp verify

  dist:
    name: CLI distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build the CLI distribution
        run: ./mvnw -B -ntp -pl tesseraql-cli -am -Pdist -DskipTests package

      - name: Smoke-test the fat jar
        run: java -jar tesseraql-cli/target/tesseraql-cli-*-all.jar routes --app examples/scaffold-demo-app

  # The documentation site (docs/docs-site.md): the same build command Cloudflare
  # Workers Builds runs, so green CI implies a clean deploy. This is also where the
  # sync's completeness guard and the links validator gate PRs: a new docs/*.md that
  # is neither mapped nor excluded, or a broken internal link, fails here.
  docs-site:
    name: Docs site (Astro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: docs-site/package.json

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install
        working-directory: docs-site
        run: pnpm install --frozen-lockfile

      - name: Build the site (sync, completeness guard, links validation)
        working-directory: docs-site
        run: pnpm run build

  # The VS Code extension (docs/vscode-extension.md): typecheck, the node:test suite
  # over the editor-free core, and a vsce package smoke so a broken manifest can
  # never merge.
  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: vscode-extension/package.json

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vscode-extension/pnpm-lock.yaml

      - name: Install
        working-directory: vscode-extension
        run: pnpm install --frozen-lockfile

      - name: Build and test
        working-directory: vscode-extension
        run: pnpm run test

      - name: Package smoke
        working-directory: vscode-extension
        run: pnpm run package
