name: jpackage

# Builds the CLI as a jpackage app image (a platform launcher with a bundled JVM) on each OS.
# jpackage keeps the dynamic classpath the runtime needs (ServiceLoader codecs/drivers, the
# --modules child classloader, signed plugins/) — unlike a closed-world native image. Runs on CLI
# changes (validation) and on release tags / manual dispatch (artifacts).

on:
  pull_request:
    paths:
      - 'tesseraql-cli/**'
      - '.github/workflows/jpackage.yml'
      - 'pom.xml'
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# contents:write so the tag build can attach its app-image archive to the GitHub release; only the
# tag-gated "Attach" step writes (PR/dispatch builds just validate and upload a CI artifact).
permissions:
  contents: write

jobs:
  jpackage:
    name: Native image on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build the fat jar
        run: ./mvnw -B -ntp -pl tesseraql-cli -am -Pdist -DskipTests package

      - name: Build the app image
        shell: bash
        run: |
          VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          APPVER=${VERSION%-SNAPSHOT}
          # jpackage (macOS) rejects a zero major version; pre-1.0 dev builds use a 1.0.0 bundle
          # placeholder. The authoritative version stays in the jar manifest (tesseraql --version).
          case "$APPVER" in 0.*) APPVER=1.0.0 ;; esac
          mkdir -p build/jpackage-input
          cp tesseraql-cli/target/tesseraql-cli-*-all.jar build/jpackage-input/tesseraql.jar
          # On Windows, build a console-subsystem launcher (--win-console) so the CLI's stdout/stderr
          # reach the terminal. Without it jpackage produces a GUI-subsystem tesseraql.exe that runs
          # but prints nothing when invoked from cmd/PowerShell — the tool looks unresponsive. The
          # flag is Windows-only (jpackage rejects it on Linux/macOS), so add it conditionally.
          console=()
          [ "$RUNNER_OS" = "Windows" ] && console=(--win-console)
          jpackage --type app-image --name tesseraql \
            --input build/jpackage-input --main-jar tesseraql.jar \
            --main-class io.tesseraql.cli.TesseraqlCli \
            --add-modules java.se,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.localedata,jdk.unsupported,jdk.management,jdk.naming.dns,jdk.zipfs,jdk.httpserver,jdk.net,jdk.security.auth \
            --app-version "$APPVER" \
            "${console[@]}" \
            --dest build/jpackage

      - name: Smoke-test the native launcher
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux) LAUNCHER=build/jpackage/tesseraql/bin/tesseraql ;;
            macOS) LAUNCHER=build/jpackage/tesseraql.app/Contents/MacOS/tesseraql ;;
            Windows) LAUNCHER=build/jpackage/tesseraql/tesseraql.exe ;;
          esac
          # Assert the launcher actually writes to stdout: a Windows GUI-subsystem launcher (built
          # without --win-console) runs and exits 0 but prints nothing, so an exit-code-only check
          # would miss it. Capturing and grepping the output guards that regression.
          out=$("$LAUNCHER" routes --app examples/scaffold-demo-app)
          printf '%s\n' "$out"
          printf '%s' "$out" | grep -q '[^[:space:]]' \
            || { echo "launcher produced no stdout (Windows console subsystem?)" >&2; exit 1; }

      - name: Upload the app image
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: tesseraql-${{ matrix.os }}
          path: build/jpackage
          if-no-files-found: error

      # Phase 38 Tier 1: ship the JRE-free app-image as a stable Release download (not just a
      # time-limited CI artifact). tar.gz for Linux/macOS, zip for Windows; named by real version
      # (the jar manifest version, not the jpackage 1.0.0 placeholder) and runner arch. Runs on PRs
      # too (the result is only attached on tags) so the archiving is validated before a real release.
      - name: Archive the app image
        shell: bash
        run: |
          ROOT="$PWD"
          VERSION=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)
          VERSION=${VERSION%-SNAPSHOT}
          ARCH=$(uname -m)
          case "$RUNNER_OS" in
            Linux)
              ASSET="tesseraql-${VERSION}-linux-${ARCH}.tar.gz"
              tar -C build/jpackage -czf "$ASSET" tesseraql ;;
            macOS)
              ASSET="tesseraql-${VERSION}-macos-${ARCH}.tar.gz"
              tar -C build/jpackage -czf "$ASSET" tesseraql.app ;;
            Windows)
              ASSET="tesseraql-${VERSION}-windows-${ARCH}.zip"
              ( cd build/jpackage && 7z a -tzip "$ROOT/$ASSET" tesseraql > /dev/null ) ;;
          esac
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Attach the app image to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$GITHUB_REF_NAME"
          # release.yml publishes the release near the END of its run (verify + deploy first), so
          # this per-OS job will usually finish first — poll until the release exists, then attach.
          for i in $(seq 1 60); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" "$ASSET" --clobber
              echo "Attached $ASSET to $TAG"
              exit 0
            fi
            echo "Waiting for release $TAG ($i/60)..."
            sleep 20
          done
          echo "Release $TAG did not appear within the timeout" >&2
          exit 1
