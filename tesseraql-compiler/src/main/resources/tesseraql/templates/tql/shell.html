<!DOCTYPE html>
<!-- The framework page layout (design ch. 12): the Hypermedia Components app shell.
     Generic form, for any app with its own sidebar navigation:
       ~{tql/shell :: shell(title, nav, header, content)}
     System-console form, with the built-in system navigation:
       ~{tql/shell :: page(title, header, content)}
     `nav` fills the sidebar, `header` receives per-page top-bar extras (badges, action links),
     `content` becomes the main region. Pass ~{} for an empty slot. -->
<html xmlns:th="http://www.thymeleaf.org" th:fragment="shell(title, nav, header, content)"
      lang="en" th:lang="${#locale.toLanguageTag()}" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- The browser session's CSRF token for the Hypermedia Components installCsrfHeader behavior:
     it reads this tag at request time and attaches the X-CSRF-Token header to every htmx
     request (rendered only when an authenticated session resolved the token). -->
<meta name="csrf-token" th:if="${_csrf}" th:content="${_csrf}">
<title th:text="${title}">TesseraQL</title>
<link rel="stylesheet" href="/assets/vendor/hypermedia-components__core/dist/hc.min.css">
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
<script src="/assets/vendor/htmx.org/dist/htmx.min.js" defer></script>
<!-- The locale's message catalog must merge into the kit before its behaviors install at
     DOMContentLoaded; module scripts execute in document order, so this stays first. -->
<script type="module" th:src="|/assets/_tesseraql/messages.js?locale=${#locale.toLanguageTag()}|"
        src="/assets/_tesseraql/messages.js?locale=en"></script>
<script type="module" src="/assets/_tesseraql/tesseraql.js"></script>
</head>
<body>
<div class="hc-shell">
  <header class="hc-shell__header">
    <button class="hc-button" data-variant="ghost" data-hc-shell-toggle
            aria-label="Open navigation" type="button">&#9776;</button>
    <strong th:text="${title}">TesseraQL</strong>
    <th:block th:replace="${header}"/>
  </header>
  <!-- data-hc-nav-current: the kit's installNavCurrent behavior marks the active link with
       aria-current="page" (longest path-segment prefix wins, re-applied after htmx history nav) — the
       hc-item selected style keys off it. CSP-safe, no inline JS. -->
  <nav class="hc-shell__sidebar" aria-label="Primary" data-hc-nav-current>
    <th:block th:replace="${nav}"/>
  </nav>
  <main class="hc-shell__main">
    <th:block th:replace="${content}"/>
  </main>
</div>
</body>
</html>
<th:block th:fragment="page(title, header, content)"
          th:replace="~{tql/shell :: shell(${title}, ~{tql/shell :: system-nav}, ${header}, ${content})}"/>
<th:block th:fragment="system-nav">
  <a class="hc-item" href="/_tesseraql/ops/console">Operations</a>
  <a class="hc-item" href="/_tesseraql/studio/ui">Studio</a>
  <a class="hc-item" href="/_tesseraql/admin/users">IAM Admin</a>
</th:block>
<!-- The Studio app's own section navigation (Studio platform UX, track H1): the system console
     `page(...)` form only renders the 3-app `system-nav`, leaving Studio with no section nav, so
     every section was reachable only via the explorer's header link cluster. `studio-page(...)`
     mounts this sidebar instead; the kit's installNavCurrent (data-hc-nav-current) marks the link.
     The list is unconditional — sections gated by mode (read-only / scaffolding off) render their
     own disabled state, which is honest wayfinding. The system apps stay reachable below. -->
<th:block th:fragment="studio-page(title, header, content)"
          th:replace="~{tql/shell :: shell(${title}, ~{tql/shell :: studio-nav}, ${header}, ${content})}"/>
<th:block th:fragment="studio-nav">
  <a class="hc-item" href="/_tesseraql/studio/ui">Explorer</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/docs">Docs</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/docs/coverage">Coverage</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/docs/schema">Schema</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/docs/export">Export</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/scaffold">Scaffold</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/migration">Migration</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/sql-builder">SQL builder</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/drafts">Drafts</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/audit">Audit</a>
  <a class="hc-item" href="/_tesseraql/studio/ui/wizard">Wizards</a>
  <hr aria-hidden="true">
  <a class="hc-item" href="/_tesseraql/ops/console">Operations</a>
  <a class="hc-item" href="/_tesseraql/admin/users">IAM Admin</a>
</th:block>
<!-- A loading affordance for an async (htmx) action: htmx toggles the `htmx-indicator`
     element visible while the request is in flight (its injected indicator style applies
     under the `style-src 'unsafe-inline'` CSP), so a slow DB call no longer reads as a hang.
     Uses the kit's `hc-spinner` (CSS-only, reduced-motion aware) with a contextual label; the
     spinner is decorative (`aria-hidden`) and role="status" on the wrapper announces the label.
     Place it inside the request-initiating element (e.g. a form's button cluster) or point an
     `hx-indicator` at one. -->
<th:block th:fragment="busy(label)"><span class="htmx-indicator hc-cluster" role="status"><span class="hc-spinner" data-size="sm" aria-hidden="true"></span><span class="hc-field__message" th:text="${label}">Working…</span></span></th:block>
