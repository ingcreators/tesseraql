<!--
  TesseraQL horizontal wordmark (primary — for light backgrounds).
  Use for: light-themed docs, README headers, store listings, marketing pages.
  Icon is self-contained on its own dark rect, so it prints correctly on
  any background; only the wordmark text color needs a variant.

  Family conventions (see ingcreators/annot brand/): icon 48×48 at left,
  text x=62 y=33, Sora 700 26px, letter-spacing -0.03em.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 48" fill="none" role="img" aria-label="TesseraQL">
  <!-- App-icon mark (48×48) at left -->
  <rect width="48" height="48" rx="10" fill="#0f1730"/>
  <rect x="7" y="8" width="12" height="12" rx="2" fill="#7ef0c5"/>
  <rect x="29" y="8" width="12" height="12" rx="2" fill="#b391ff"/>
  <rect x="21" y="8" width="6" height="32" rx="3" fill="#7c9cff"/>

  <!-- Wordmark — cap height ≈ icon middle third for visual balance -->
  <text x="62" y="33"
        fill="#0f1730"
        font-family="Sora, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="26"
        letter-spacing="-0.03em">TesseraQL</text>
</svg>
