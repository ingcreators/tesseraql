<!--
  TesseraQL stacked wordmark (inverse — for dark backgrounds).
  Icon + "TesseraQL" + "by ingcreators" tagline on dark bg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="TesseraQL by ingcreators">
  <g transform="translate(0 4)">
    <rect width="48" height="48" rx="10" fill="#0f1730"/>
    <rect x="7" y="8" width="12" height="12" rx="2" fill="#7ef0c5"/>
    <rect x="29" y="8" width="12" height="12" rx="2" fill="#b391ff"/>
    <rect x="21" y="8" width="6" height="32" rx="3" fill="#7c9cff"/>
  </g>

  <text x="62" y="30"
        fill="#eef2ff"
        font-family="Sora, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="22"
        letter-spacing="-0.025em">TesseraQL</text>

  <!-- Muted ink on dark — blue-derived, not grey (family text rule) -->
  <text x="62" y="46"
        fill="#9fb0dc"
        font-family="Sora, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="500"
        font-size="11"
        letter-spacing="0.02em">by ingcreators</text>
</svg>
