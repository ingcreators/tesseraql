<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: ops-page('Outbox Deliveries', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/ops/console">&larr; console</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack" hx-get="/_tesseraql/ops/console/outbox" hx-trigger="every 15s"
     hx-select="#page-content" hx-target="this" hx-swap="outerHTML">
<section class="hc-card">
  <h2>Outbox deliveries</h2>
  <ul class="hc-chips">
    <li th:each="s : ${outbox.byStatus}" class="hc-badge"
        th:attr="data-variant=${s.statusVariant}">[[${s.status}]]: [[${s.count}]]</li>
  </ul>
  <div class="hc-empty" th:unless="${outbox.hasRows}"><p class="hc-empty__title">No outbox events recorded.</p></div>
  <div class="hc-datagrid" th:if="${outbox.hasRows}">
    <div class="hc-datagrid__scroll">
      <table class="hc-datagrid__table">
        <thead class="hc-datagrid__head"><tr>
          <th class="hc-datagrid__headcell">Event</th>
          <th class="hc-datagrid__headcell">Type</th>
          <th class="hc-datagrid__headcell">Source</th>
          <th class="hc-datagrid__headcell">App</th>
          <th class="hc-datagrid__headcell">Status</th>
          <th class="hc-datagrid__headcell">Attempts</th>
          <th class="hc-datagrid__headcell">Last error</th>
          <th class="hc-datagrid__headcell">Created</th>
          <th class="hc-datagrid__headcell">Sent</th>
        </tr></thead>
        <tbody class="hc-datagrid__body">
          <tr class="hc-datagrid__row" th:each="e : ${outbox.rows}">
            <td class="hc-datagrid__cell" th:text="${e.id}"></td>
            <td class="hc-datagrid__cell" th:text="${e.type}"></td>
            <td class="hc-datagrid__cell" th:text="${e.source}"></td>
            <td class="hc-datagrid__cell" th:text="${e.app}"></td>
            <td class="hc-datagrid__cell"><span class="hc-badge" th:attr="data-variant=${e.statusVariant}" th:text="${e.status}"></span></td>
            <td class="hc-datagrid__cell" th:text="${e.attempts}"></td>
            <td class="hc-datagrid__cell" th:text="${e.lastError}"></td>
            <td class="hc-datagrid__cell" th:text="${e.createdAt}"></td>
            <td class="hc-datagrid__cell" th:text="${e.sentAt}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <p class="hc-field__message">Dead-lettered events can be requeued with
    <code>POST /_tesseraql/ops/outbox/&lt;event-id&gt;/redeliver</code>.</p>
</section>
</div>
</html>
