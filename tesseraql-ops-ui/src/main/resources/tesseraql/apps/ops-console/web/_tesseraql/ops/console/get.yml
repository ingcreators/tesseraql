version: tesseraql/v1
id: tql.opsConsole.overview
kind: route
recipe: query-html

security:
  auth: browser
  policy: ops.batch.view

sql:
  service: ops.overview
  params:
    # Narrows batch visibility to the caller's ops.app.<name> grants (deny by default).
    permissions: principal.permissions

response:
  html:
    status: 200
    template: overview.html
    model:
      ops: sql
