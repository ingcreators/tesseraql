version: tesseraql/v1
id: tql.opsConsole.outbox
kind: route
recipe: query-html

security:
  auth: browser
  policy: ops.batch.view

sql:
  service: ops.outbox
  params:
    # Narrows visibility to the caller's ops.app.<name> grants (deny by default).
    permissions: principal.permissions

response:
  html:
    status: 200
    template: outbox.html
    model:
      outbox: sql
