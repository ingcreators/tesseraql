<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: ops-page('File Transfers', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/_tesseraql/ops/console">&larr; console</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack" hx-get="/_tesseraql/ops/console/transfers" hx-trigger="every 15s"
     hx-select="#page-content" hx-target="this" hx-swap="outerHTML">
<section class="hc-card">
  <h2>File transfers</h2>
  <div class="hc-empty" th:unless="${transfers.hasRows}"><p class="hc-empty__title">No file transfers recorded.</p></div>
  <div class="hc-datagrid" th:if="${transfers.hasRows}">
    <div class="hc-datagrid__scroll">
      <table class="hc-datagrid__table">
        <thead class="hc-datagrid__head"><tr>
          <th class="hc-datagrid__headcell">Transfer</th>
          <th class="hc-datagrid__headcell">Route</th>
          <th class="hc-datagrid__headcell">App</th>
          <th class="hc-datagrid__headcell">Direction</th>
          <th class="hc-datagrid__headcell">Format</th>
          <th class="hc-datagrid__headcell">Status</th>
          <th class="hc-datagrid__headcell">Rows</th>
          <th class="hc-datagrid__headcell">File</th>
          <th class="hc-datagrid__headcell">Downloaded</th>
          <th class="hc-datagrid__headcell">Started</th>
        </tr></thead>
        <tbody class="hc-datagrid__body">
          <tr class="hc-datagrid__row" th:each="t : ${transfers.rows}">
            <td class="hc-datagrid__cell" th:text="${t.id}"></td>
            <td class="hc-datagrid__cell" th:text="${t.route}"></td>
            <td class="hc-datagrid__cell" th:text="${t.app}"></td>
            <td class="hc-datagrid__cell" th:text="${t.direction}"></td>
            <td class="hc-datagrid__cell" th:text="${t.format}"></td>
            <td class="hc-datagrid__cell"><span class="hc-badge" th:attr="data-variant=${t.statusVariant}" th:text="${t.status}"></span></td>
            <td class="hc-datagrid__cell" th:text="${t.rows}"></td>
            <td class="hc-datagrid__cell" th:text="${t.filename}"></td>
            <td class="hc-datagrid__cell" th:text="${t.downloaded}"></td>
            <td class="hc-datagrid__cell" th:text="${t.createdAt}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</div>
</html>
