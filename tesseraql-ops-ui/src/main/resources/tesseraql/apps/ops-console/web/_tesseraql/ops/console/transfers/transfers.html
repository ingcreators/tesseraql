<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: page('File Transfers', ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <a class="back" href="/_tesseraql/ops/console">&larr; console</a>
</th:block>
<div id="page-content" hx-get="/_tesseraql/ops/console/transfers" hx-trigger="every 15s"
     hx-select="#page-content" hx-target="this" hx-swap="outerHTML">
<section class="hc-card">
  <h2>File transfers</h2>
  <p class="empty" th:unless="${transfers.hasRows}">No file transfers recorded.</p>
  <table class="hc-table" th:if="${transfers.hasRows}">
    <thead><tr><th>Transfer</th><th>Route</th><th>App</th><th>Direction</th><th>Format</th><th>Status</th><th>Rows</th><th>File</th><th>Downloaded</th><th>Started</th></tr></thead>
    <tbody>
      <tr th:each="t : ${transfers.rows}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.route}"></td>
        <td th:text="${t.app}"></td>
        <td th:text="${t.direction}"></td>
        <td th:text="${t.format}"></td>
        <td th:class="${t.statusClass}" th:text="${t.status}"></td>
        <td th:text="${t.rows}"></td>
        <td th:text="${t.filename}"></td>
        <td th:text="${t.downloaded}"></td>
        <td th:text="${t.createdAt}"></td>
      </tr>
    </tbody>
  </table>
</section>
</div>
</html>
