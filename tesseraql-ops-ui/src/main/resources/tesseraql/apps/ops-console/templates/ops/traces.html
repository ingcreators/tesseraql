<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL Operations Console · traces</title>
<link rel="stylesheet" href="/assets/vendor/hypermedia-components__core/dist/hc.min.css">
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>Traces</h1>
  <a class="back" href="/_tesseraql/ops/console">&larr; console</a>
</header>
<main>
<section class="hc-card">
  <p class="empty" th:unless="${traces.hasSpans}">No traces retained.</p>
  <table class="hc-table" th:if="${traces.hasSpans}">
    <thead><tr><th>Span</th><th>Total (ms)</th><th>Self (ms)</th><th></th></tr></thead>
    <tbody>
      <tr th:each="s : ${traces.spans}" th:classappend="${s.slow} ? 'slow'">
        <td th:style="'padding-left:' + ${s.indentPx} + 'px'"><span class="span-name" th:text="${s.name}"></span></td>
        <td th:text="${s.totalMs}"></td>
        <td th:text="${s.selfMs}"></td>
        <td><span class="span-error" th:if="${s.error}">error</span></td>
      </tr>
    </tbody>
  </table>
</section>
</main>
</body>
</html>
