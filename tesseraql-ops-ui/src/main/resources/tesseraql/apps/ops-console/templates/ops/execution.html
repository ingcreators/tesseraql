<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL Operations Console · execution</title>
<link rel="stylesheet" href="/assets/vendor/hypermedia-components__core/dist/hc.min.css">
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>Execution [[${execution.id}]]</h1>
  <a class="back" href="/_tesseraql/ops/console">&larr; console</a>
</header>
<main>
<section class="hc-card" th:unless="${execution.found}"><p class="empty">Execution not found.</p></section>
<th:block th:if="${execution.found}">
<section class="hc-card">
  <h2>Summary</h2>
  <table class="hc-table kv"><tbody>
    <tr><th>Job</th><td th:text="${execution.jobId}"></td></tr>
    <tr><th>Status</th><td th:class="${execution.statusClass}" th:text="${execution.status}"></td></tr>
    <tr><th>Trigger</th><td th:text="${execution.trigger}"></td></tr>
    <tr><th>Started</th><td th:text="${execution.startTime}"></td></tr>
    <tr><th>Ended</th><td th:text="${execution.endTime}"></td></tr>
    <tr><th>Duration (ms)</th><td th:text="${execution.durationMs}"></td></tr>
    <tr><th>Exit message</th><td th:text="${execution.exitMessage}"></td></tr>
  </tbody></table>
</section>
<section class="hc-card" id="steps">
  <h2>Steps</h2>
  <p class="empty" th:unless="${execution.hasSteps}">No steps recorded.</p>
  <table class="hc-table" th:if="${execution.hasSteps}">
    <thead><tr><th>Step</th><th>Status</th><th>Rows</th><th>Duration (ms)</th><th>Error</th></tr></thead>
    <tbody>
      <tr th:each="s : ${execution.steps}" th:classappend="${s.failed} ? 'warn'">
        <td th:text="${s.stepId}"></td>
        <td th:class="${s.statusClass}" th:text="${s.status}"></td>
        <td th:text="${s.affectedRows}"></td>
        <td th:text="${s.durationMs}"></td>
        <td th:text="${s.errorMessage}"></td>
      </tr>
    </tbody>
  </table>
</section>
</th:block>
</main>
</body>
</html>
