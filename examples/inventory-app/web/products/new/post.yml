version: tesseraql/v1
id: products.create
kind: route
recipe: command-json

input:
  sku: { type: string, required: true, maxLength: 40, pattern: "[A-Z]{2}-[0-9]+" }
  name: { type: string, required: true, maxLength: 200 }
  category: { type: string, required: true, enum: [peripherals, displays, furniture, other] }
  stock: { type: integer, required: true, min: 0 }
  reorder_level: { type: integer, required: false, min: 0 }

security:
  policy: inv.write

sql:
  file: create.sql
  mode: update
  params:
    sku: params.sku
    name: params.name
    category: params.category
    stock: params.stock
    reorder_level: params.reorder_level

response:
  json:
    status: 201
    body:
      created: sql.affectedRows
