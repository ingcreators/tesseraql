version: tesseraql/v1
id: products.page
kind: route
recipe: query-html

input:
  q: { type: string, required: false, maxLength: 100 }
  sort: { type: string, required: false }
  dir: { type: string, required: false, enum: [asc, desc] }

security:
  policy: inv.read

page:
  size: 20
  count: true

sql:
  file: products.sql
  mode: query
  params:
    q: query.q

response:
  html:
    status: 200
    view: list.view.yml
