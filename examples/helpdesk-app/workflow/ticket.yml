version: tesseraql/v1
id: ticket
kind: workflow
mode: app
document: { type: ticket, table: tickets, key: id, stateColumn: status }
http: { basePath: /api/tickets }
security: { auth: bearer, policy: help.agent }
initial: open
states:
  - { id: open, type: initial }
  - { id: triaged }
  - { id: resolved }
  - { id: closed, type: terminal }
transitions:
  - { id: triage, from: open, to: triaged, command: triage.sql }
  - { id: resolve, from: triaged, to: resolved, command: resolve.sql }
  - { id: reopen, from: resolved, to: triaged, command: triage.sql }
  - { id: close, from: resolved, to: closed, command: close.sql }
