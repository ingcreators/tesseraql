tesseraql:
  app:
    name: helpdesk

  datasources:
    main:
      jdbcUrl: ${db.main.url}
      username: ${db.main.username}
      password: ${db.main.password}

  security:
    # Path-matched route security defaults (docs/route-defaults.md): every route in this
    # API-shaped app authenticates with a bearer token.
    defaults:
      routes:
        - match: /**
          auth: bearer

    # The security header block every HTML response sends (docs/response-shaping.md
    # "Default response headers"); a route overrides per header name, `unset` suppresses.
    responseHeaders:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
    jwt:
      secret: ${JWT_SECRET:dev-only-secret-change-me-in-production}
      rolesClaim: roles
    policies:
      help.read:
        anyOf:
          - role: HELP_READ
          - role: AGENT
          - role: ADMIN
      help.agent:
        anyOf:
          - role: AGENT
          - role: ADMIN

  # App-mode workflow: the ticket row itself carries the state column — contrast with
  # purchase-request-app's managed mode (docs/approval-workflow.md).
  workflow:
    mode: app

  # The assignment notification: point MAIL_HOST at any SMTP (Mailpit for the demo). The
  # declarative tests assert the notify without touching SMTP (docs/notifications.md).
  notifications:
    channels:
      agent-mail:
        type: mail
        host: ${MAIL_HOST:localhost}
        port: ${MAIL_PORT:2525}
        from: helpdesk@example.com
        template: templates/mail/assigned.txt
