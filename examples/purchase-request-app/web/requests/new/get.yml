version: tesseraql/v1
id: requests.new
kind: route
recipe: query-html

security:
  auth: bearer
  policy: pr.write

sql:
  file: none.sql
  mode: query

response:
  html:
    status: 200
    view: new.view.yml
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
