<!DOCTYPE html>
<!-- IAM user administration page: the framework shell with the app navigation and the user list
     rendered inline from the identity.list-users contract. -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: shell('User Management (IAM)', ~{templates/nav.html :: app-nav}, ~{}, ~{:: #page-content})}">
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <h2>User Management</h2>
  <p>Registered users: <strong th:text="${count}"></strong></p>
  <table class="hc-table">
    <thead>
      <tr>
        <th>Login ID</th>
        <th>Display Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.login_id}"></td>
        <td th:text="${u.display_name}"></td>
        <td th:text="${u.email}"></td>
        <td class="hc-status" th:attr="data-variant=${u.status == 'ACTIVE' ? 'success' : 'error'}" th:text="${u.status}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(users)}"><td colspan="4">No users</td></tr>
    </tbody>
  </table>
</section>
</div>
</html>
