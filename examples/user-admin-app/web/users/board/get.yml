version: tesseraql/v1
id: users.board
kind: route
recipe: query-html

security:
  auth: browser
  policy: users.read

sql:
  file: board.sql

response:
  html:
    view: board.view.yml
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
