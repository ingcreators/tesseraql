version: tesseraql/v1
id: users.apiProvision
kind: route
recipe: command-json

# Activates a user and, in the same transaction, emits a SCIM provisioning event
# (USER_PROVISIONED). The outbox payload is assembled into the SCIM User shape via dotted
# keys, so the downstream SCIM provider receives a structured resource without any glue code.

input:
  userName:
    type: string
    required: true
  externalId:
    type: string
  givenName:
    type: string
  familyName:
    type: string
  active:
    type: boolean

inputPolicy:
  unknownFields: reject

security:
  auth: bearer
  policy: users.write

# Declarative validation (roadmap Phase 19): the user being provisioned must already exist.
# The SQL rule runs inside the command's transaction; a violation answers a field-scoped 422
# before the UPDATE writes.
validate:
  userExists:
    file: validate-user-exists.sql
    params:
      userName: body.userName
    field: userName
    code: unknown-user
    message: users.provision.unknown-user

outbox:
  eventType: USER_PROVISIONED
  aggregateType: User
  aggregateId: body.userName
  payload:
    userName: body.userName
    externalId: body.externalId
    active: body.active
    name.givenName: body.givenName
    name.familyName: body.familyName

sql:
  file: provision.sql
  mode: update
  params:
    userName: body.userName

response:
  json:
    status: 200
    body:
      affected: sql.affectedRows
      eventId: sql.eventId
