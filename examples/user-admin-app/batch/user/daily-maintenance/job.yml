version: tesseraql/v1
id: user.dailyMaintenance
kind: job
recipe: batch-pipeline

trigger:
  schedule:
    cron: "0 0 2 * * ?"

params:
  businessDate:
    type: string
    required: false

pipeline:
  - id: deactivatePending
    sql:
      file: deactivate-pending.sql
      mode: update
  # Phase 20: a notify step reports the run through the audit webhook, riding the outbox.
  - id: report
    notify:
      channel: audit-webhook
      payload:
        deactivated: step.deactivatePending.affectedRows
