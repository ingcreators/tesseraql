tests:
  - name: the board view lists every user
    sql:
      file: web/users/board/board.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - name: sato

  - name: the board detail resolves a user by name
    sql:
      file: web/users/board/{name}/detail.sql
    params:
      name: sato
    expect:
      rowCount: 1
      rows:
        - status: ACTIVE

  - name: the board detail lists the groups child
    sql:
      file: web/users/board/{name}/groups.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - display_name: engineers

  - name: the stats dashboard counts every user
    sql:
      file: web/users/board/stats/totals.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - user_count: 1

  - name: the stats dashboard groups users by status
    sql:
      file: web/users/board/stats/by-status.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - status: ACTIVE

  - name: search finds sato by name
    sql:
      file: web/api/users/search.sql
    params:
      q: sato
      limit: 50
      offset: 0
    expect:
      rowCount: 1
      rows:
        - name: sato

  - name: search without query returns all users
    sql:
      file: web/api/users/search.sql
    params:
      q: ""
      limit: 50
      offset: 0
    expect:
      rowCount: 1

  - name: the printable user list extraction returns sato
    sql:
      file: web/api/users/print/print.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - name: sato

  # A write case: the UPDATE runs for real inside an always-rolled-back transaction,
  # updateCount asserts the affected rows, and the verify read-back observes the write.
  - name: deactivating sato affects one row and the search sees the new status
    sql:
      file: web/api/users/deactivate/deactivate.sql
    params:
      name: sato
    expect:
      updateCount: 1
    verify:
      - sql:
          file: web/api/users/search.sql
        params:
          q: sato
          limit: 50
          offset: 0
        expect:
          rowCount: 1
          rows:
            - status: INACTIVE

  - name: admin user resolves the USER_READ role
    contract: identity.find-roles-by-user-id
    params:
      userId: u1
    expect:
      rows:
        - role_code: USER_READ

  - name: provisioning an unknown user violates the userExists rule
    validate:
      route: users.apiProvision
    params:
      body:
        userName: nobody
    expect:
      rowCount: 1
      rows:
        - rule: userExists
          field: userName
          code: unknown-user
          message: users.provision.unknown-user

  - name: provisioning an existing user passes validation
    validate:
      route: users.apiProvision
    params:
      body:
        userName: sato
    expect:
      rowCount: 0

  - name: provisioning an active user notifies the confirmation mail and the audit webhook
    notify:
      route: users.apiProvision
    params:
      body:
        userName: sato
        givenName: Hanako
        active: true
      principal:
        loginId: admin
    expect:
      rowCount: 2
      rows:
        - notify: confirmation
          channel: user-mail
          userName: sato
          givenName: Hanako
        - notify: audit
          channel: audit-webhook
          userName: sato
          actor: admin

  - name: provisioning an inactive user skips the confirmation mail
    notify:
      route: users.apiProvision
    params:
      body:
        userName: sato
        active: false
    expect:
      rowCount: 1
      rows:
        - notify: audit

  - name: daily maintenance reports the run through the audit webhook
    notify:
      job: user.dailyMaintenance
    params:
      step:
        deactivatePending:
          affectedRows: 3
    expect:
      rowCount: 1
      rows:
        - notify: report
          channel: audit-webhook
          deactivated: 3

  # Phase 22 message catalogs: every shipped locale is exercised (message coverage kind).
  - name: the japanese catalog translates the provisioning error and the page chrome
    messages:
      locale: ja
      keys:
        - users.provision.unknown-user
        - users.list.title
    expect:
      rowCount: 2
      rows:
        - key: users.provision.unknown-user
          text: 指定されたユーザーは存在しません。
        - key: users.list.title
          text: ユーザー一覧

  - name: the english catalog is the authoring default
    messages:
      locale: en
      keys:
        - users.provision.unknown-user
    expect:
      rows:
        - text: The user does not exist.
