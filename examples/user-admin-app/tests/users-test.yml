tests:
  - name: search finds sato by name
    sql:
      file: web/api/users/search.sql
    params:
      q: sato
      limit: 50
      offset: 0
    expect:
      rowCount: 1
      rows:
        - name: sato

  - name: search without query returns all users
    sql:
      file: web/api/users/search.sql
    params:
      q: ""
      limit: 50
      offset: 0
    expect:
      rowCount: 1

  - name: the printable user list extraction returns sato
    sql:
      file: web/api/users/print/print.sql
    params: {}
    expect:
      rowCount: 1
      rows:
        - name: sato

  - name: admin user resolves the USER_READ role
    contract: identity.find-roles-by-user-id
    params:
      userId: u1
    expect:
      rows:
        - role_code: USER_READ

  - name: provisioning an unknown user violates the userExists rule
    validate:
      route: users.apiProvision
    params:
      body:
        userName: nobody
    expect:
      rowCount: 1
      rows:
        - rule: userExists
          field: userName
          code: unknown-user
          message: users.provision.unknown-user

  - name: provisioning an existing user passes validation
    validate:
      route: users.apiProvision
    params:
      body:
        userName: sato
    expect:
      rowCount: 0

  - name: provisioning an active user notifies the confirmation mail and the audit webhook
    notify:
      route: users.apiProvision
    params:
      body:
        userName: sato
        givenName: Hanako
        active: true
      principal:
        loginId: admin
    expect:
      rowCount: 2
      rows:
        - notify: confirmation
          channel: user-mail
          userName: sato
          givenName: Hanako
        - notify: audit
          channel: audit-webhook
          userName: sato
          actor: admin

  - name: provisioning an inactive user skips the confirmation mail
    notify:
      route: users.apiProvision
    params:
      body:
        userName: sato
        active: false
    expect:
      rowCount: 1
      rows:
        - notify: audit

  - name: daily maintenance reports the run through the audit webhook
    notify:
      job: user.dailyMaintenance
    params:
      step:
        deactivatePending:
          affectedRows: 3
    expect:
      rowCount: 1
      rows:
        - notify: report
          channel: audit-webhook
          deactivated: 3

  # Phase 22 message catalogs: every shipped locale is exercised (message coverage kind).
  - name: the japanese catalog translates the provisioning error and the page chrome
    messages:
      locale: ja
      keys:
        - users.provision.unknown-user
        - users.list.title
    expect:
      rowCount: 2
      rows:
        - key: users.provision.unknown-user
          text: 指定されたユーザーは存在しません。
        - key: users.list.title
          text: ユーザー一覧

  - name: the english catalog is the authoring default
    messages:
      locale: en
      keys:
        - users.provision.unknown-user
    expect:
      rows:
        - text: The user does not exist.
