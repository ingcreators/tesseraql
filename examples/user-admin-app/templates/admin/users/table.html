<div id="identity-users" class="hc-card">
  <header class="hc-card__header">
    <h2 class="hc-heading">ユーザー管理</h2>
  </header>
  <table class="hc-table">
    <thead>
      <tr>
        <th>ログインID</th>
        <th>表示名</th>
        <th>メール</th>
        <th>状態</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.login_id}"></td>
        <td th:text="${u.display_name}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.status}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(users)}"><td colspan="4">ユーザーがいません</td></tr>
    </tbody>
  </table>
</div>
