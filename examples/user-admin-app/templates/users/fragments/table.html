<div id="user-table" class="hc-card">
  <table class="hc-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>名前</th>
        <th>ステータス</th>
      </tr>
    </thead>
    <tbody>
      {{# users }}
      <tr>
        <td>{{ id }}</td>
        <td>{{ name }}</td>
        <td>{{ status }}</td>
      </tr>
      {{/ users }}
      {{^ users }}
      <tr>
        <td colspan="3">該当するユーザーがいません</td>
      </tr>
      {{/ users }}
    </tbody>
  </table>
</div>
