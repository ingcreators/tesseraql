<div id="user-table" class="hc-card">
  <table class="hc-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>名前</th>
        <th>ステータス</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.status}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(users)}">
        <td colspan="3">該当するユーザーがいません</td>
      </tr>
    </tbody>
  </table>
</div>
