tesseraql:
  app:
    name: user-admin
    home: ${TESSERAQL_APP_HOME:.}
    work: ${TESSERAQL_WORK_HOME:${TESSERAQL_APP_HOME}/work}

  runtime:
    engine: camel
    profile: ${TESSERAQL_PROFILE:local}

  java:
    baseline: 21
    compatibility:
      - 25

  # Phase 22 internationalization: the app serves English and Japanese. The request locale
  # resolves from the ?lang= query parameter (handy for a language toggle), then the signed-in
  # user's locale claim, then Accept-Language, then the default. Catalogs live in
  # messages/<locale>.yml.
  i18n:
    defaultLocale: en
    locales: [en, ja]
    preference:
      - query.lang
      - principal.claim.locale

  datasources:
    main:
      type: hikari
      jdbcUrl: ${db.main.url}
      username: ${db.main.username}
      password: ${db.main.password}

  # Phase 20 notification channels: notify: declarations reference these by name.
  # Credentials would ride the SecretResolver SPI (${secret.env.SMTP_PASSWORD}); the local
  # defaults below point at a dev SMTP server and a dev webhook receiver.
  notifications:
    channels:
      user-mail:
        type: mail
        host: ${MAIL_HOST:localhost}
        port: ${MAIL_PORT:2525}
        from: noreply@example.com
        to: ops@example.com
        subject: "Account provisioned: [(${payload.userName})]"
        template: templates/mail/provisioned.txt
      audit-webhook:
        type: webhook
        url: ${AUDIT_WEBHOOK_URL:http://localhost:9999/hook}
        secret: ${AUDIT_WEBHOOK_SECRET:dev-only-webhook-secret}
    # Operations alerts (job failures, threshold breaches) reuse the same channels:
    # alerts:
    #   channel: audit-webhook

  # Phase 26 managed connectors: outbound HTTP for http-call pipeline steps. Egress is
  # deny-by-default — a call may only target a host in allowedHosts (exact or *.wildcard).
  # Credentials ride the SecretResolver SPI and resolve at call time, never into artifacts.
  http:
    outbound:
      allowedHosts:
        - api.directory.example
      credentials:
        directory:
          type: header
          header: X-API-Key
          value: ${secret.env.DIRECTORY_API_KEY:dev-only-directory-key}

  identity:
    defaultRealm: local
    realms:
      local:
        type: managed
        datasource: main

  camel:
    components:
      allowed:
        - direct
        - platform-http
        - timer
        - quartz
        - file
        - log
        - tesseraql-sql
        - tesseraql-auth
        - tesseraql-html
        - smtp
      denied:
        - exec
        - script
        - groovy
        - class

  security:
    defaults:
      routes:
        - match: /api/**
          auth: bearer
        - match: /**
          auth: browser
          csrf: auto

    # The security header block every HTML response sends (docs/response-shaping.md
    # "Default response headers"); a route overrides per header name, `unset` suppresses.
    responseHeaders:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer

    jwt:
      secret: ${JWT_SECRET:dev-only-secret-change-me-in-production}
      rolesClaim: roles
      permissionsClaim: permissions
      tenantClaim: tenant_id

    policies:
      # The starter policies every scaffolded route references (tesseraql new ships the same
      # block): defining them here keeps "scaffold CRUD from a table" servable out of the box.
      # The example's ADMIN operator may browse scaffolded slices too.
      app.read:
        anyOf:
          - role: APP_READ
          - role: ADMIN
          - permission: app:read
      app.write:
        anyOf:
          - role: APP_WRITE
          - role: ADMIN
          - permission: app:write
      users.read:
        anyOf:
          - role: USER_READ
          - permission: users:read
      users.write:
        anyOf:
          - role: USER_WRITE
          - permission: users:write
      iam.admin.view:
        anyOf:
          - role: ADMIN
          - role: IAM_ADMIN
          - permission: iam:admin:view
      iam.admin.write:
        anyOf:
          - role: ADMIN
          - role: IAM_ADMIN
          - permission: iam:admin:write
      ops.batch.view:
        anyOf:
          - role: ADMIN
          - role: BATCH_VIEWER
          - role: BATCH_OPERATOR
          - permission: ops:batch:view
      ops.batch.run:
        anyOf:
          - role: ADMIN
          - role: BATCH_OPERATOR
          - permission: ops:batch:run
