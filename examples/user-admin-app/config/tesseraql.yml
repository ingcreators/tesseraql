tesseraql:
  app:
    name: user-admin
    home: ${TESSERAQL_APP_HOME:.}
    work: ${TESSERAQL_WORK_HOME:${TESSERAQL_APP_HOME}/work}

  runtime:
    engine: camel
    profile: ${TESSERAQL_PROFILE:local}

  java:
    baseline: 21
    compatibility:
      - 25

  datasources:
    main:
      type: hikari
      jdbcUrl: ${db.main.url}
      username: ${db.main.username}
      password: ${db.main.password}

  identity:
    defaultRealm: local
    realms:
      local:
        type: managed
        datasource: main

  camel:
    components:
      allowed:
        - direct
        - platform-http
        - timer
        - quartz
        - file
        - log
        - tesseraql-sql
        - tesseraql-auth
        - tesseraql-html
      denied:
        - exec
        - script
        - groovy
        - class

  security:
    defaults:
      api:
        auth: bearer
      htmx:
        auth: browser
        csrf: auto

    jwt:
      secret: ${JWT_SECRET:dev-only-secret-change-me-in-production}
      rolesClaim: roles
      permissionsClaim: permissions
      tenantClaim: tenant_id

    policies:
      users.read:
        anyOf:
          - role: USER_READ
          - permission: users:read
      users.write:
        anyOf:
          - role: USER_WRITE
          - permission: users:write
      iam.admin.view:
        anyOf:
          - role: ADMIN
          - role: IAM_ADMIN
          - permission: iam:admin:view
      ops.batch.view:
        anyOf:
          - role: ADMIN
          - role: BATCH_VIEWER
          - role: BATCH_OPERATOR
          - permission: ops:batch:view
      ops.batch.run:
        anyOf:
          - role: ADMIN
          - role: BATCH_OPERATOR
          - permission: ops:batch:run
