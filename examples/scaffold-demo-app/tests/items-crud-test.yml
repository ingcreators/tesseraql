# tesseraql-scaffold-checksum: sha256:8c024a763fae68652730c220f68beee48ec56c1efbb947f62a781ced88a8ee0d
# Scaffolded suite for the items table (design ch. 13): exercises the generated
# queries with data-independent expectations, so it passes against any contents.
tests:
  - name: the items search runs without a filter
    sql:
      file: web/items/fragments/table/search.sql
    params:
      sort: id
      dir: asc

  - name: the items search filters by name
    sql:
      file: web/items/fragments/table/search.sql
    params:
      q: no-such-row
      sort: id
      dir: asc
    expect:
      rowCount: 0

  - name: the items search sorts by name descending
    sql:
      file: web/items/fragments/table/search.sql
    params:
      sort: name
      dir: desc

  - name: the items detail select misses for an unknown key
    sql:
      file: web/items/{id}/select.sql
    params:
      id: -1
    expect:
      rowCount: 0
