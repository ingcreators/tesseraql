# and the header slot's New button.
version: tesseraql/v1
id: items
kind: view
view: list
title: Items
search: q
columns:
  - name: id
    sortable: true
  - name: name
    sortable: true
  - name: quantity
    sortable: true
  - name: unit_price
    sortable: true
  - name: due_date
    sortable: true
  - name: active
    sortable: true
