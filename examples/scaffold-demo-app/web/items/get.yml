# tesseraql-scaffold-checksum: sha256:d49603171fca9f3f4587c27455961cf53cfe626ae0bdebd99b304d535da66d40
# Scaffolded list page for the items table (tesseraql scaffold crud --table items):
# renders through the tql/view/list pattern (docs/declarative-views.md).
version: tesseraql/v1
id: items.page
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false
    maxLength: 200
  sort:
    type: string
    enum: [id, name, quantity, unit_price, due_date, active, note]
    default: id
  dir:
    type: string
    enum: [asc, desc]
    default: asc

security:
  auth: browser
  policy: app.read

sql:
  file: search.sql
  mode: query
  params:
    q: query.q
    sort: query.sort
    dir: query.dir

page:
  size: 50
  maxSize: 200
  count: true

response:
  html:
    view: list.view.yml
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
