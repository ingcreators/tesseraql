# tesseraql-scaffold-checksum: sha256:dd6f451ef3a147b6b3eb4ab760a998a81ff971d9906d7e5950990773424149db
# Scaffolded list page for the items table (tesseraql scaffold crud --table items):
# renders through the tql/view/list pattern (docs/declarative-views.md).
version: tesseraql/v1
id: items.page
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false
    maxLength: 200
  sort:
    type: string
    enum: [id, name, quantity, unit_price, due_date, active, note]
    default: id
  dir:
    type: string
    enum: [asc, desc]
    default: asc

security:
  policy: app.read

sql:
  file: search.sql
  mode: query
  params:
    q: query.q
    sort: query.sort
    dir: query.dir

page:
  size: 50
  maxSize: 200
  count: true

response:
  html:
    view: list.view.yml
