<!DOCTYPE html>
<!-- tesseraql-scaffold-checksum: sha256:806ace23ab00f26672ac8f45a03681b1a089eb980ea61f6e423d316f5829dfe5 -->
<!-- Scaffolded create form for the items table: the hc mutating-form recipe —
     htmx post with inline field errors and a success redirect, degrading to
     a plain form post with no JS (docs/hypermedia-ui.md). -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: shell('Items', ~{templates/nav.html :: app-nav}, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/items">&larr; Items</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card">
  <h2>New</h2>
  <form id="items-create-form" method="post" action="/items/create"
        hx-post="/items/create" hx-target="#items-create-form-errors" hx-swap="innerHTML"
        hx-disabled-elt="find button[type=submit]" hx-indicator="find .hc-spinner">
    <input type="hidden" name="_csrf" th:value="${_csrf}">
    <div id="items-create-form-errors"></div>
    <div class="hc-stack">
      <div class="hc-field">
        <label class="hc-field__label" for="field-name">Name</label>
        <input class="hc-input" id="field-name" type="text" name="name" maxlength="200" required>
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-quantity">Quantity</label>
        <input class="hc-input" id="field-quantity" type="number" name="quantity" required>
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-unit-price">Unit price</label>
        <input class="hc-input" id="field-unit-price" type="number" name="unitPrice" step="any">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-due-date">Due date</label>
        <input class="hc-datepicker" id="field-due-date" type="date" name="dueDate">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-active">Active</label>
        <input type="hidden" name="active" value="false">
        <input class="hc-checkbox" id="field-active" type="checkbox" name="active" value="true">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-note">Note</label>
        <input class="hc-input" id="field-note" type="text" name="note" maxlength="1000">
      </div>
      <span class="hc-action">
        <button type="submit" class="hc-button" data-variant="primary">Create</button>
        <span class="hc-spinner htmx-indicator" aria-hidden="true"></span>
      </span>
    </div>
  </form>
</section>
</div>
</html>
