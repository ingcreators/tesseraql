<!DOCTYPE html>
<!-- tesseraql-scaffold-checksum: sha256:c5f3266bc6c8b809622980778359002c5eb7c206f67d47757b81a79ec455a177 -->
<!-- Scaffolded edit page for the items table: the hc mutating-form recipe —
     htmx posts with inline field errors and a success redirect (a stale
     version answers 409 Conflict, Phase 18), a confirmed delete, and a no-JS
     plain-form fallback (docs/hypermedia-ui.md). -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{tql/shell :: shell('Items', ~{templates/nav.html :: app-nav}, ~{:: #page-header}, ~{:: #page-content})}">
<th:block id="page-header">
  <span class="hc-spacer"></span>
  <div class="hc-cluster">
    <a class="hc-button" data-variant="ghost" data-size="sm" href="/items">&larr; Items</a>
  </div>
</th:block>
<div id="page-content" class="hc-stack">
<section class="hc-card" th:if="${#lists.isEmpty(rows)}">
  <div class="hc-empty"><p class="hc-empty__title">Not found.</p></div>
</section>
<th:block th:each="r : ${rows}">
<section class="hc-card">
  <h2>Edit</h2>
  <form id="items-update-form" method="post" th:action="|/items/${r.id}/update|"
        th:attr="hx-post=|/items/${r.id}/update|" hx-target="#items-update-form-errors" hx-swap="innerHTML"
        hx-disabled-elt="find button[type=submit]" hx-indicator="find .hc-spinner">
    <input type="hidden" name="_csrf" th:value="${_csrf}">
    <div id="items-update-form-errors"></div>
    <div class="hc-stack">
      <div class="hc-field">
        <label class="hc-field__label" for="field-name">Name</label>
        <input class="hc-input" id="field-name" type="text" name="name" maxlength="200" required th:value="${r.name}">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-quantity">Quantity</label>
        <input class="hc-input" id="field-quantity" type="number" name="quantity" required th:value="${r.quantity}">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-unit-price">Unit price</label>
        <input class="hc-input" id="field-unit-price" type="number" name="unitPrice" step="any" th:value="${r.unit_price}">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-due-date">Due date</label>
        <input class="hc-datepicker" id="field-due-date" type="date" name="dueDate" th:value="${r.due_date}">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-active">Active</label>
        <input type="hidden" name="active" value="false">
        <input class="hc-checkbox" id="field-active" type="checkbox" name="active" value="true" th:checked="${r.active}">
      </div>
      <div class="hc-field">
        <label class="hc-field__label" for="field-note">Note</label>
        <input class="hc-input" id="field-note" type="text" name="note" maxlength="1000" th:value="${r.note}">
      </div>
      <input type="hidden" name="version" th:value="${r.version}">
      <span class="hc-action">
        <button type="submit" class="hc-button" data-variant="primary">Save</button>
        <span class="hc-spinner htmx-indicator" aria-hidden="true"></span>
      </span>
    </div>
  </form>
</section>
<section class="hc-card">
  <h2>Delete</h2>
  <form id="items-delete-form" method="post" th:action="|/items/${r.id}/delete|"
        th:attr="hx-post=|/items/${r.id}/delete|" hx-trigger="hc:confirmed"
        hx-target="#items-delete-form-errors" hx-swap="innerHTML"
        hx-disabled-elt="find button[type=submit]" hx-indicator="find .hc-spinner">
    <input type="hidden" name="_csrf" th:value="${_csrf}">
    <div id="items-delete-form-errors"></div>
      <input type="hidden" name="version" th:value="${r.version}">
  <span class="hc-action">
    <button type="submit" class="hc-button" data-variant="error"
            data-hc-confirm="Delete this record?" data-hc-confirm-title="Confirm delete"
            data-hc-confirm-ok="Delete" data-hc-confirm-variant="error">Delete</button>
    <span class="hc-spinner htmx-indicator" aria-hidden="true"></span>
  </span>
  </form>
</section>
</th:block>
</div>
</html>
