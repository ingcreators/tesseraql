# Scaffolded delete command for the items table.
version: tesseraql/v1
id: items.delete
kind: route
recipe: command-json

input:
  id:
    type: integer
    required: true
  version:
    type: integer
    required: true

inputPolicy:
  unknownFields: reject

security:
  auth: browser
  policy: app.write
  csrf: true

sql:
  file: delete.sql
  mode: update
  expect:
    rows: 1
    onMismatch: conflict
  params:
    id: params.id
    version: params.version

response:
  redirect:
    location: /items
