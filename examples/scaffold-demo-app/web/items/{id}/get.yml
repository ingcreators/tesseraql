# Scaffolded detail and edit page for the items table.
version: tesseraql/v1
id: items.detail
kind: route
recipe: query-html

input:
  id:
    type: integer
    required: true

security:
  policy: app.read

sql:
  file: select.sql
  mode: query
  params:
    id: params.id

response:
  html:
    view: edit.view.yml
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
