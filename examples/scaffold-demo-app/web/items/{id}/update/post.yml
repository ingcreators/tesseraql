# Scaffolded update command for the items table: optimistic locking turns a stale edit into 409 Conflict.
version: tesseraql/v1
id: items.update
kind: route
recipe: command-json

input:
  id:
    domain: items.id
    required: true
  name:
    domain: items.name
    required: true
  quantity:
    domain: items.quantity
    required: true
  unitPrice:
    domain: items.unitPrice
  dueDate:
    domain: items.dueDate
  active:
    domain: items.active
    required: true
  note:
    domain: items.note
  version:
    domain: items.version
    required: true

inputPolicy:
  unknownFields: reject

security:
  policy: app.write

sql:
  file: update.sql
  mode: update
  expect:
    rows: 1
    onMismatch: conflict
  params:
    id: params.id
    name: params.name
    quantity: params.quantity
    unitPrice: params.unitPrice
    dueDate: params.dueDate
    active: params.active
    note: params.note
    version: params.version

response:
  redirect:
    location: /items/{path.id}
