# tesseraql-scaffold-checksum: sha256:3572f30267c0276500e56706c97567ab484d37794e590ed51a3f1080df41eb54
# Scaffolded table fragment for the items table; the list page swaps it in via htmx.
version: tesseraql/v1
id: items.table
kind: route
recipe: query-html

input:
  q:
    type: string
    required: false
    maxLength: 200
  sort:
    type: string
    required: false
  dir:
    type: string
    required: false

security:
  auth: browser
  policy: app.read

sql:
  file: search.sql
  mode: query
  params:
    q: query.q
    sort: query.sort
    dir: query.dir

response:
  html:
    status: 200
    template: table.html
    model:
      rows: sql.rows
      count: sql.rowCount
      sort: params.sort
      dir: params.dir
