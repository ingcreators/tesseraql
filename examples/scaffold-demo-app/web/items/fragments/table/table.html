<!-- Scaffolded table fragment for the items table: partial markup swapped into
     the list page (the fragments URL convention, design ch. 4). The hc-datagrid
     component scrolls wide tables horizontally and keeps the header in view; it
     degrades to a plain styled grid with no JavaScript (docs/hypermedia-ui.md).
     Column headers sort server-side: each is a link to ?sort=col&dir=…, swapped
     over htmx, and aria-sort drives the kit's sort arrow (CSP-clean, no inline JS). -->
<div id="items-table" class="hc-datagrid">
  <input type="hidden" name="sort" th:value="${sort}">
  <input type="hidden" name="dir" th:value="${dir}">
  <div class="hc-datagrid__scroll">
    <table class="hc-datagrid__table">
      <thead class="hc-datagrid__head">
        <tr>
          <th class="hc-datagrid__headcell" data-sortable data-col="id"
              th:attr="aria-sort=${sort == 'id' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=id&amp;dir=${sort == 'id' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Id</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="name"
              th:attr="aria-sort=${sort == 'name' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=name&amp;dir=${sort == 'name' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Name</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="quantity"
              th:attr="aria-sort=${sort == 'quantity' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=quantity&amp;dir=${sort == 'quantity' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Quantity</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="unit_price"
              th:attr="aria-sort=${sort == 'unit_price' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=unit_price&amp;dir=${sort == 'unit_price' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Unit price</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="due_date"
              th:attr="aria-sort=${sort == 'due_date' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=due_date&amp;dir=${sort == 'due_date' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Due date</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="active"
              th:attr="aria-sort=${sort == 'active' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=active&amp;dir=${sort == 'active' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Active</a>
          </th>
          <th class="hc-datagrid__headcell" data-sortable data-col="note"
              th:attr="aria-sort=${sort == 'note' ? (dir == 'desc' ? 'descending' : 'ascending') : 'none'}">
            <a th:with="u=|/items/fragments/table?sort=note&amp;dir=${sort == 'note' and dir != 'desc' ? 'desc' : 'asc'}|"
               th:href="${u}" th:attr="hx-get=${u}"
               hx-target="#items-table-area" hx-swap="innerHTML" hx-include="[name='q']">Note</a>
          </th>
          <th class="hc-datagrid__headcell"></th>
        </tr>
      </thead>
      <tbody class="hc-datagrid__body">
        <tr class="hc-datagrid__row" th:each="r : ${rows}">
          <td class="hc-datagrid__cell" th:text="${r.id}"></td>
          <td class="hc-datagrid__cell" th:text="${r.name}"></td>
          <td class="hc-datagrid__cell" th:text="${r.quantity}"></td>
          <td class="hc-datagrid__cell" th:text="${r.unit_price}"></td>
          <td class="hc-datagrid__cell" th:text="${r.due_date}"></td>
          <td class="hc-datagrid__cell" th:text="${r.active}"></td>
          <td class="hc-datagrid__cell" th:text="${r.note}"></td>
          <td class="hc-datagrid__cell"><a class="hc-button" data-size="sm" th:href="|/items/${r.id}|">Open</a></td>
        </tr>
        <tr class="hc-datagrid__row" th:if="${#lists.isEmpty(rows)}">
          <td class="hc-datagrid__cell" colspan="8">No rows</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
