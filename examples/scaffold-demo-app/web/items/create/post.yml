# Scaffolded create command for the items table: one transaction, audit binds, and
# field-level constraint errors (docs/transactional-writes.md).
version: tesseraql/v1
id: items.create
kind: route
recipe: command-json

input:
  name:
    domain: items.name
    required: true
  quantity:
    domain: items.quantity
    required: true
  unitPrice:
    domain: items.unitPrice
  dueDate:
    domain: items.dueDate
  active:
    domain: items.active
    required: true
  note:
    domain: items.note

inputPolicy:
  unknownFields: reject

security:
  policy: app.write

steps:
  record:
    file: insert.sql
    mode: update
    keys: [id]
    params:
      name: params.name
      quantity: params.quantity
      unitPrice: params.unitPrice
      dueDate: params.dueDate
      active: params.active
      note: params.note

response:
  redirect:
    location: /items/{steps.record.keys.id}
