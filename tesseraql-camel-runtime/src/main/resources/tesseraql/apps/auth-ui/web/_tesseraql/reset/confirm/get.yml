version: tesseraql/v1
id: tql.auth.reset.confirm
kind: route
recipe: query-html

# The mailed reset link's landing page (roadmap Phase 50). The token is only VALIDATED on
# the POST (a GET stays side-effect free); unknown, used, and expired tokens all land back
# here with the same honest invalid flag.

input:
  token:
    type: string
    required: false
    maxLength: 128
  invalid:
    type: string
    required: false
  error:
    type: string
    required: false

security:
  auth: public

sql:
  service: auth.loginMethods

response:
  html:
    status: 200
    template: confirm.html
    model:
      methods: sql
      token: params.token
      invalid: params.invalid
      error: params.error
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
      Cache-Control: "no-store"
