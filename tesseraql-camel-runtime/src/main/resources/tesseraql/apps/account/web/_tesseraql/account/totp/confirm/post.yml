version: tesseraql/v1
id: tql.account.totp.confirm
kind: route
recipe: command-json

# Confirms the pending TOTP enrollment with a valid code (roadmap Phase 50 slice 3). A
# wrong code is TQL-ACCOUNT-4802; the accepted step is recorded so it cannot replay at
# the login that follows.

input:
  code:
    type: string
    required: true
    maxLength: 6

security:
  auth: browser
  csrf: true

sql:
  service: account.totp.confirm
  params:
    code: params.code
    subject: principal.subject
    tenantId: principal.tenantId

response:
  redirect:
    status: 303
    location: /_tesseraql/account
