# A hung test must FAIL with the stuck thread's stack trace, not stall CI until the job is
# killed (the 2026-07-09 Java-25 run sat 46 minutes inside StudioIntegrationTest after a
# hot reload, with the suite's HTTP helpers blocked in HttpClient.send — no request
# timeout, no test timeout, no diagnostics). These defaults interrupt the test thread, so
# the next occurrence reports exactly where it was stuck and the rest of the suite still
# runs. Any legitimately slower test can raise its own @Timeout; today's slowest is ~10s.
junit.jupiter.execution.timeout.default = 5 m
# Testcontainers pulls and framework migrations run in @BeforeAll — give lifecycle
# methods more headroom than test methods.
junit.jupiter.execution.timeout.lifecycle.method.default = 10 m
