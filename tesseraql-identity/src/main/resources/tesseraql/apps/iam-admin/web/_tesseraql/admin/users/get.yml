version: tesseraql/v1
id: tql.iamAdmin.users.list
kind: route
recipe: query-html

security:
  auth: browser
  policy: iam.admin.view

sql:
  contract: identity.list-users

queries:
  total:
    contract: identity.count-users

response:
  html:
    status: 200
    template: list.html
    model:
      users: sql.rows
      total: total.rows
    headers:
      Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: no-referrer
