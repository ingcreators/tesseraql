<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TesseraQL IAM Admin · users</title>
<link rel="stylesheet" href="/assets/_tesseraql/tesseraql.css">
</head>
<body>
<header class="topbar">
  <h1>IAM Admin · Users</h1>
  {{# total }}<span class="badge">{{ count }} total</span>{{/ total }}
</header>
<main>
<section>
  {{^ users }}<p class="empty">No users found.</p>{{/ users }}
  <table>
    <thead><tr><th>Login</th><th>Display name</th><th>Email</th><th>Status</th><th>Tenant</th></tr></thead>
    <tbody>
    {{# users }}
      <tr>
        <td><a href="/_tesseraql/admin/users/{{ user_id }}">{{ login_id }}</a></td>
        <td>{{ display_name }}</td>
        <td>{{ email }}</td>
        <td>{{ status }}</td>
        <td>{{ tenant_id }}</td>
      </tr>
    {{/ users }}
    </tbody>
  </table>
</section>
</main>
</body>
</html>
